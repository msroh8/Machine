              'Active Testing': 'الاختبار النشط: إرسال حزم بيانات بشكل متعمد ومباشر للخادم لمعرفة كيف سيرد (مثل طرق الباب بقوة لمعرفة إن كان هناك حارس). قد يتم رصده من قبل أنظمة الحماية.',
              'Passive Testing': 'الاختبار السلبي: المراقبة في صمت. مثل الجلوس في مقهى والاستماع لحركة مرور البيانات (Traffic) في الشبكة دون إرسال أي طلب مباشر، وبالتالي يصعب جداً على أنظمة الحماية رصدك.'

            summary: {

            keyPoints: [

            mcq: {
              question: 'Which testing method relies on techniques like Metadata Analysis and Traffic Monitoring without direct interaction?',

          {
            id: 's9',
            title: '9. Validation & Research',
            content: `Once potential flaws are identified, the following stages are critical:\n• Validation of Findings: Proving the vulnerability exists through techniques such as Correlation between tools.\n• Research:\n• Determining the accuracy of the identified issue.\n• Researching the potential exploitability of the vulnerability within the specific scope of the test.\n\n"Validation prevents the delivery of false positives to the client."`,
            contentAr: `بمجرد تحديد العيوب المحتملة، تصبح المراحل التالية حاسمة:\n• التحقق من النتائج (Validation): إثبات وجود الثغرة فعلياً من خلال تقنيات مثل الارتباط (Correlation) والمقاطعة بين نتائج أدوات الفحص المختلفة.\n• البحث (Research):\n• تحديد دقة وصحة المشكلة المكتشفة.\n• البحث في إمكانية الاستغلال الفعلي للثغرة ضمن النطاق المحدد للاختبار.\n\n"التحقق يمنع تسليم إيجابيات كاذبة (False positives) للعميل."`,
            keywords: {
              'Validation': 'التحقق: لا نثق بنتيجة أداة فحص واحدة. التحقق يعني استخدام أداة أخرى أو الفحص اليدوي لتأكيد أن الثغرة حقيقية وليست وهماً.',
              'Correlation': 'الارتباط/المقاطعة: أداة (أ) تقول هناك ثغرة في المنفذ 80، وأداة (ب) تؤكد نفس الشيء. هذا الترابط يعطينا ثقة عالية بوجود المشكلة حقاً.',
              'false positives': 'الإيجابيات الكاذبة: الكابوس الأكبر للعملاء. وهي أن تخبر العميل بوجود ثغرة خطيرة، فيقضي فريقه أياماً لمحاولة إصلاحها ليتبين في النهاية أنها مجرد خطأ من أداة الفحص ولا وجود لها.'
            },
            summary: {
              en: 'Validation and research are critical to confirm that vulnerabilities actually exist and are exploitable, preventing the reporting of false positives to the client.',
              ar: 'يعد التحقق والبحث أمرين حاسمين لتأكيد وجود الثغرات فعلياً وإمكانية استغلالها، مما يمنع تقديم إيجابيات كاذبة للعميل في التقرير.'
            },
            keyPoints: [
              { ar: 'يجب مقاطعة نتائج الأدوات (Correlation) للتأكد من صحتها.', en: 'Results from tools must be correlated to ensure accuracy.' },
              { ar: 'ليس كل ما تكتشفه الأدوات قابل للاستغلال الفعلي (Exploitability).', en: 'Not everything discovered by tools is actually exploitable.' },
              { ar: 'التحقق الجيد يمنع إزعاج العميل بـ "الإيجابيات الكاذبة" الوهمية.', en: 'Good validation prevents bothering the client with imaginary "false positives".' }
            ],
            mcq: {
              question: 'Why is the validation of findings a critical step?',
              options: ['To speed up the network', 'To prevent the delivery of false positives to the client', 'To increase the length of the report', 'To automatically fix the vulnerabilities'],

              explanation: 'Validating findings ensures that the reported flaws are real and actionable, avoiding false alarms (false positives).'
            }
          },
          {
            id: 's10',
            title: '10. Phase 5: Exploitation',
            content: `• Focus: Gaining access to the system or resource by bypassing security restrictions.\n• The Culmination: In this phase, all the work done in the previous phases leads to the actual breach.\n• Methods of Access:\n• Remote exploits and custom code creation.\n• Bypassing Antivirus (AV) solutions.\n• Simple login via weak credentials.`,
            contentAr: `• التركيز: الحصول على وصول (Access) للنظام أو الموارد من خلال تجاوز القيود والآليات الأمنية.\n• الذروة (التتويج): في هذه المرحلة، تؤدي جميع الجهود والأعمال التي تمت في المراحل السابقة إلى حدوث الاختراق الفعلي (Breach).\n• طرق الوصول:\n• الاستغلال عن بُعد (Remote exploits) وكتابة أكواد مخصصة.\n• تجاوز وتخطي حلول وبرامج مكافحة الفيروسات (Antivirus).\n• تسجيل الدخول البسيط عبر استغلال كلمات المرور الضعيفة.`,
            keywords: {
              'Exploitation': 'الاستغلال (الاختراق): لحظة الحقيقة. هي اللحظة التي يتحول فيها الهجوم من مجرد مسح ونظريات إلى سيطرة فعلية على النظام واستخراج البيانات.',
              'bypassing': 'التجاوز/التخطي: خداع الأنظمة الدفاعية. مثل كتابة فيروس أو كود خبيث بطريقة مشفرة ومعدلة بحيث يبدو لبرنامج الحماية كأنه ملف نصي بريء.',
              'weak credentials': 'بيانات الاعتماد الضعيفة: في كثير من الأحيان، أسهل طريقة لاختراق نظام معقد جداً هي تخمين كلمة مرور موظف وضعها "123456" بدلاً من قضاء أيام في كتابة أكواد معقدة!'
            },
            summary: {
              en: 'Phase 5 (Exploitation) is the culmination of prior work, focusing on actually breaching the system by bypassing security using exploits or weak credentials.',
              ar: 'المرحلة 5 (الاستغلال) هي تتويج للعمل السابق، وتركز على اختراق النظام فعلياً عن طريق تجاوز آليات الأمان باستخدام برمجيات الاستغلال أو كلمات المرور الضعيفة.'
            },
            keyPoints: [
              { ar: 'هذه المرحلة هي "الذروة" التي يتحقق فيها الاختراق الفعلي.', en: 'This phase is the "culmination" where the actual breach is achieved.' },
              { ar: 'الهدف الرئيسي هو تجاوز القيود الأمنية للحصول على صلاحية الوصول.', en: 'Main goal is bypassing security restrictions to gain access.' },
              { ar: 'الاختراق قد يكون معقداً بأكواد، أو بسيطاً بكلمة سر ضعيفة.', en: 'Breach can be complex via code, or simple via weak passwords.' }
            ],
            mcq: {
              question: 'Which phase represents the "Culmination" where actual breaches occur?',
              options: ['Vulnerability Analysis', 'Intelligence Gathering', 'Threat Modeling', 'Exploitation'],
              answer: 3,
              explanation: 'Exploitation is the culmination of all previous prep work, resulting in an actual breach.'
            }
          },
          {
            id: 's11',
            title: '11. High Value Targets (HVT)',
            content: `• Main Entry Point: Once initial access is achieved, the assessor must identify the main entry point.\n• Target Prioritization: The focus shifts immediately to identifying High Value Target assets.\n\nPrerequisite\nIf the Vulnerability Analysis phase was properly completed, a high value target list should have been compiled before this phase began.\n\nNote: The attack vector should always take the organization's business goals into consideration.`,
            contentAr: `• نقطة الدخول الرئيسية: بمجرد تحقيق الوصول الأولي، يجب على المُقيّم تحديد نقطة الدخول الرئيسية للشبكة الداخلية.\n• تحديد أولويات الأهداف: يتحول التركيز فوراً إلى تحديد أصول "الأهداف ذات القيمة العالية" (HVT).\n\nمتطلب مسبق\nإذا اكتملت مرحلة تحليل الثغرات بشكل صحيح، فإنه يفترض أن تكون قائمة الأهداف عالية القيمة قد جُمعت وجُهزت قبل بدء هذه المرحلة.\n\nملاحظة: يجب أن يراعي مسار الهجوم دائماً أهداف الأعمال الخاصة بالمؤسسة.`,
            keywords: {
              'initial access': 'الوصول الأولي: الحصول على موطئ قدم (مساحة صغيرة) داخل النظام. مثل اختراق جهاز كمبيوتر لموظف استقبال، وهو مجرد بداية للوصول للأهداف الأكبر.',
              'High Value Targets': 'الأهداف عالية القيمة (HVT): الجائزة الكبرى. قد تكون خادم قواعد البيانات الذي يحوي أرقام البطاقات الائتمانية، أو خادم البريد الإلكتروني للمدير التنفيذي.',
              'business goals': 'أهداف الأعمال: الهاكر المحترف يدرك أن تعطيل طابعة الشركة لا يهم بقدر اختراق نظام تحويل الأموال، فيوجه هجومه بناءً على ما يؤلم الشركة تجارياً.'
            },
            summary: {
              en: 'After initial access, attackers prioritize High Value Targets (HVTs) which should have been identified during Vulnerability Analysis, aligning attacks with business impact.',
              ar: 'بعد الوصول الأولي، يركز المهاجمون على الأهداف ذات القيمة العالية (HVTs) التي كان ينبغي تحديدها خلال تحليل الثغرات، مع مواءمة الهجمات مع تأثيرها التجاري.'

            keyPoints: [
              { ar: 'يتم استغلال الوصول الأولي للبحث فوراً عن الأهداف عالية القيمة (HVT).', en: 'Initial access is used to immediately hunt for High Value Targets (HVT).' },
              { ar: 'قائمة الأهداف الثمينة يجب أن تكون جاهزة من مرحلة تحليل الثغرات.', en: 'The list of valuable targets must be ready from the Vulnerability Analysis phase.' },
              { ar: 'يجب أن يكون الهجوم موجهاً لضرب الأنظمة المؤثرة تجارياً على المؤسسة.', en: 'The attack must target systems that have a commercial impact on the organization.' }
            ],
            mcq: {
              question: 'When should the list of High Value Targets (HVTs) ideally be compiled?',
              options: ['During Post-Exploitation', 'Before Vulnerability Analysis', 'During Vulnerability Analysis (before Exploitation begins)', 'During the Pre-engagement interactions'],
              answer: 2,
              explanation: 'A high value target list should have been compiled during the Vulnerability Analysis phase, before Exploitation begins.'
            }
          },
          {
            id: 's12',
            title: '12. Phase 6: Post-Exploitation',
            content: `• Definition: This phase begins after a successful breach and focuses on the value of the machine compromised.\n• Objective: To determine the impact of the compromise and what an attacker could actually achieve once "inside."\n• Business Value: The assessor identifies the sensitivity of the data residing on the machine and its usefulness in further compromising the network.`,
            contentAr: `• التعريف: تبدأ هذه المرحلة بعد حدوث الاختراق الناجح وتركز على استكشاف "قيمة" الجهاز الذي تم الاستيلاء عليه.\n• الهدف: تحديد التأثير الفعلي للاختراق ومعرفة ما يمكن للمهاجم تحقيقه وتدميره بمجرد دخوله وتواجده "بالداخل".\n• قيمة الأعمال: يحدد المُقيّم مدى حساسية البيانات الموجودة على هذا الجهاز المًخترق، ومدى فائدتها كأداة لشن هجمات أعمق في الشبكة.`,
            keywords: {
              'Post-Exploitation': 'ما بعد الاستغلال: مرحلة ما بعد كسر الباب. الآن أنت داخل الغرفة، ماذا يمكنك أن تفعل؟ هل يمكنك قراءة الملفات؟ تشغيل الكاميرا؟ أو فتح الأبواب الأخرى؟',
              'impact': 'التأثير: ترجمة الاختراق التقني إلى لغة يفهمها المدير. (اختراق هذا الخادم يعني أن المهاجم كان بإمكانه مسح جميع سجلات الديون للعملاء).',
              'further compromising': 'اختراقات أعمق: استخدام الجهاز الضعيف كجسر للعبور إلى الأجهزة القوية. (استخراج كلمات المرور من جهاز الموظف لاستخدامها في الدخول لسيرفر الإدارة).'
            },
            summary: {
              en: 'Post-Exploitation evaluates the true business impact of a breach, exploring what an attacker can do from within the compromised machine to further target the network.',
              ar: 'تقيّم مرحلة ما بعد الاستغلال التأثير التجاري الحقيقي للاختراق، وتستكشف ما يمكن للمهاجم فعله من داخل الجهاز المخترق لاستهداف الشبكة بشكل أعمق.'
            },
            keyPoints: [
              { ar: 'تبدأ هذه المرحلة فقط "بعد" نجاح عملية الاختراق الأولية.', en: 'This phase begins only "after" a successful initial breach.' },
              { ar: 'تقيس حجم "التأثير الفعلي" الذي يمكن للهاكر إحداثه وهو بالداخل.', en: 'Measures the actual "impact" a hacker can cause while inside.' },
              { ar: 'تستكشف قيمة الجهاز كجسر للوصول لأجهزة حساسة أخرى بالشبكة.', en: 'Explores the machine\'s value as a bridge to reach other sensitive devices.' }
            ],
            mcq: {
              question: 'What is the main objective of the Post-Exploitation phase?',
              options: ['To scan for open ports externally', 'To determine the impact of the compromise once "inside"', 'To sign the engagement letter', 'To remove malware from the system'],
              answer: 1,
              explanation: 'It focuses on assessing the value of the compromised machine and what damage an attacker can do once inside.'
            }
          },
          {
            id: 's13',
            title: '13. Phase 6: Post Exploitation (Analysis & Pillaging)',
            content: `• Infrastructure Analysis: A total analysis of the environment used during testing.\n• Focus: Interfaces, routing, DNS servers, Cached DNS entries, and proxy servers.\n• Goal: Understanding the internal network topology from the "inside" perspective.\n• Pillaging: Obtaining information from targeted hosts relevant to pre-defined goals.\n• Sources: Extracting data from installed programs, database servers, and network devices like printers.`,
            contentAr: `• تحليل البنية التحتية: تحليل شامل للبيئة بعد الدخول إليها.\n• التركيز على: واجهات الشبكة، مسارات التوجيه، خوادم DNS وسجلاتها المؤقتة، والخوادم الوكيلة (Proxy).\n• الهدف: فهم هيكل وتصميم الشبكة الداخلية (Topology) ولكن من منظور "الداخل" هذه المرة.\n• السلب/النهب (Pillaging): الحصول على المعلومات والبيانات من الأجهزة المستهدفة بناءً على أهداف الاختبار المحددة مسبقاً.\n• المصادر: استخراج البيانات من البرامج المثبتة، خوادم قواعد البيانات، وحتى أجهزة الشبكة البسيطة مثل الطابعات.`,
            keywords: {
              'topology': 'طوبولوجيا (تصميم الشبكة): من الخارج تبدو الشركة كجهاز واحد، ولكن من الداخل تظهر الشبكة كمدينة معقدة بشوارع وتقاطعات (الروترات) يجب رسم خريطتها للتحرك فيها بحرية.',
              'Pillaging': 'السلب/النهب الرقمي: تفتيش النظام المخترق بحثاً عن الغنائم. مثل البحث في ملفات (Word) عن كلمات سر مكتوبة، أو نسخ قاعدة بيانات العملاء بالكامل.',
              'Cached DNS entries': 'سجلات DNS المؤقتة: فحصها يشبه النظر في سجل "المواقع التي زارها الجهاز مؤخراً"، مما يكشف للمهاجم عن وجود خوادم داخلية سرية تتواصل معها الأجهزة.'
            },
            summary: {
              en: 'This stage of post-exploitation involves analyzing the internal network topology and "pillaging" (extracting valuable data) from compromised hosts and devices.',
              ar: 'تتضمن هذه المرحلة من ما بعد الاستغلال تحليل هيكل الشبكة الداخلية و "سلب" (استخراج البيانات القيمة) من الأجهزة المضيفة المخترقة.'
            },
            keyPoints: [
              { ar: 'يتم دراسة تصميم الشبكة (Topology) من منظور داخلي أعمق.', en: 'Network topology is studied from a deeper, internal perspective.' },
              { ar: 'النهب (Pillaging) هو استخراج البيانات الحساسة القابلة للتقييم.', en: 'Pillaging is extracting valuable, sensitive data for assessment.' },
              { ar: 'حتى الأجهزة البسيطة كالطابعات تُعتبر مصدراً مهماً للمعلومات الداخلية.', en: 'Even simple devices like printers are vital sources of internal info.' }
            ],
            mcq: {
              question: 'In the context of Post-Exploitation, what does "Pillaging" refer to?',
              options: ['Stealing physical servers', 'Obtaining valuable information/data from targeted hosts', 'Deleting all logs', 'Installing an antivirus program'],
              answer: 1,
              explanation: 'Pillaging is the process of extracting relevant data from installed programs, databases, and devices.'
            }
          },
          {
            id: 's14',
            title: '14. Data Exfiltration & Persistence',
            content: `• Data Exfiltration: Mapping and testing all possible exfiltration paths.\n• Metric: Measuring control strength for detecting and blocking sensitive information leaving the organization.\n• Creating Persistence: Maintaining access for long-term analysis.\n• Installation of authenticated backdoors and ensuring they survive system reboots.\n• Creation of alternate accounts with complex passwords to maintain a "foothold."`,
            contentAr: `• استخراج البيانات (Exfiltration): تحديد واختبار جميع المسارات الممكنة لتهريب البيانات للخارج.\n• المقياس: قياس قوة أنظمة الرقابة في اكتشاف وحظر المعلومات الحساسة أثناء محاولة خروجها من شبكة المؤسسة.\n• إنشاء البقاء (Persistence): الحفاظ على منفذ وصول للنظام لإجراء تحليل طويل الأمد.\n• تثبيت "أبواب خلفية" (Backdoors) مصادق عليها وضمان بقائها حتى بعد إعادة تشغيل النظام (Reboot).\n• إنشاء حسابات مستخدمين بديلة بكلمات مرور معقدة للحفاظ على "موطئ قدم" داخل الشبكة.`,
            keywords: {
              'Data Exfiltration': 'تهريب البيانات: التحدي للهاكر ليس فقط سرقة البيانات، بل كيف يخرج بها من باب الشركة (الإنترنت) دون أن ترصده أنظمة (DLP) التي تراقب خروج الملفات الحساسة.',
              'Persistence': 'البقاء/الاستمرارية: ضمان عدم فقدان السيطرة إذا قام الموظف بإطفاء جهازه. يزرع الهاكر برمجيات تعمل تلقائياً مع تشغيل الويندوز لضمان اتصال دائم.',
              'backdoors': 'الأبواب الخلفية: منافذ سرية خفية يزرعها المهاجم للعودة للنظام لاحقاً بسهولة، دون الحاجة لإعادة عملية الاختراق المعقدة من البداية.',
              'foothold': 'موطئ قدم: حساب خفي بصلاحيات عالية (Admin) يضمن للمهاجم أنه حتى لو تم ترقيع الثغرة الأساسية، فإنه لا يزال يمتلك مفتاحاً شرعياً للدخول.'
            },
            summary: {
              en: 'Attackers test paths to exfiltrate sensitive data without detection, and establish persistence (using backdoors and hidden accounts) to survive system reboots and maintain access.',
              ar: 'يختبر المهاجمون مسارات تهريب البيانات الحساسة دون اكتشافهم، وينشئون آليات استمرارية (بأبواب خلفية وحسابات خفية) للبقاء حتى بعد إعادة تشغيل النظام.'
            },
            keyPoints: [
              { ar: 'اختبار مدى قدرة أنظمة الشركة على رصد ومنع "تهريب البيانات".', en: 'Testing the company\'s systems ability to detect and block "data exfiltration".' },
              { ar: 'الاستمرارية (Persistence) تضمن بقاء تحكم الهاكر حتى بعد إطفاء الأجهزة.', en: 'Persistence ensures the hacker\'s control survives even system reboots.' },
              { ar: 'يتم زرع أبواب خلفية (Backdoors) وحسابات وهمية لتأمين الرجوع.', en: 'Backdoors and dummy accounts are planted to secure a return path.' }
            ],

            contentAr: `الخطوة التقنية النهائية\nالتنظيف هو متطلب إلزامي وحتمي لإعادة النظام إلى حالته الأصلية.\n• الاستعادة (Restoration): إرجاع إعدادات النظام ومعلمات تكوين التطبيقات إلى قيمها الأصلية السابقة.\n• الإزالة (Removal): مسح جميع الأبواب الخلفية (Backdoors)، والبرامج النصية المؤقتة، والأدوات التي تم تثبيتها أثناء الاختبار.\n• نظافة الحسابات (Account Hygiene): حذف أي حسابات مستخدمين تم إنشاؤها لغرض ضمان البقاء (Persistence).\n\nملاحظة: تضمن هذه المرحلة أن عملية الاختبار لن تترك المؤسسة مكشوفة وعرضة للمهاجمين الحقيقيين.`,

            title: '21. Problems: Attack & Privilege Escalation',
            content: `• Specialization Required: Significant knowledge is needed for exploit and tool development (local host exploits, backdoors, etc.).\n• The Pivoting Gap: Pivoting is a key factor for success, yet it is currently the least formalized process in manual testing.\n• Security Weakness: There is often a lack of a dedicated security architecture for the penetration test itself (protecting the tester's own tools and data).`,
            contentAr: `• الحاجة للتخصص: يتطلب تطوير برمجيات الاستغلال والأدوات (مثل اختراق المضيف المحلي، والأبواب الخلفية) مستوى عالياً جداً من المعرفة البرمجية المتخصصة.\n• فجوة التمحور (Pivoting): يُعد التمحور عاملاً رئيسياً لنجاح الاختراق، ومع ذلك فهو حالياً العملية الأقل تنظيماً وتوثيقاً في الاختبار اليدوي.\n• الضعف الأمني (للمختبرين): غالباً ما يكون هناك نقص في وجود هيكل أمني مخصص لحماية عملية اختبار الاختراق نفسها (أي حماية أدوات المختبر والبيانات التي جمعها من السرقة).`,
            keywords: {
              'Privilege Escalation': 'تصعيد الصلاحيات: أنت دخلت النظام بحساب "ضيف" (Guest) لا يستطيع فعل شيء. التحدي هو استغلال ثغرة داخلية لترقية حسابك ليصبح "مدير النظام" (Administrator).',
              'Pivoting': 'التمحور (الدوران): استخدام سيرفر ضعيف تم اختراقه كـ "نقطة انطلاق أو جسر" للوصول إلى سيرفرات أخرى معزولة في الشبكة الداخلية لا يمكن الوصول لها من الإنترنت مباشرة.',
              'protecting the tester\'s': 'حماية أدوات المختبر: المفارقة أن حاسوب فريق الاختبار يكون مليئاً بالثغرات والأكواد الخطيرة، وإذا تم اختراقه أثناء المهمة، سيسرق الهاكر الحقيقي كل ثغرات الشركة جاهزة!'
            },
            summary: {
              en: 'Attacking and escalating privileges require highly specialized coding skills. Furthermore, pivoting lacks formal procedures, and testers often neglect the security of their own testing environment.',
              ar: 'تتطلب عمليات الهجوم وتصعيد الصلاحيات مهارات برمجية متخصصة جداً. علاوة على ذلك، يفتقر "التمحور" للإجراءات الرسمية، وغالباً ما يهمل المختبرون تأمين بيئة الاختبار الخاصة بهم.'
            },
            keyPoints: [
              { ar: 'تطوير الأدوات وتصعيد الصلاحيات يتطلب مبرمجين ذوي تخصص عميق.', en: 'Tool development and privilege escalation require deeply specialized programmers.' },
              { ar: 'عملية "التمحور" (Pivoting) داخل الشبكة عشوائية وغير منظمة جيداً.', en: '"Pivoting" within the network is random and lacks formalized processes.' },
              { ar: 'فريق الاختبار غالباً ما ينسى تأمين وحماية أدواته وبياناته الخاصة.', en: 'Testing teams often forget to secure and protect their own tools and data.' }
            ],
            mcq: {
              question: 'What does the "Security Weakness" referring to the penetration test itself imply?',
              options: ['The client\'s network is perfectly secure', 'The tester\'s own tools and gathered data are often left unprotected', 'Antiviruses stop working during tests', 'Passwords are too long to crack'],
              answer: 1,
              explanation: 'It highlights the irony that testers often lack a dedicated security architecture to protect their own hacking tools and the sensitive data they gather.'
            }
          },
          {
            id: 's22',
            title: '22. Problems: The Clean Up Phase',
            content: `• Operational Risk: Cleaning compromised hosts must be done securely without affecting the client's normal operations.\n• Verification: Current practice lacks a verifiable and non-repudiable cleanup process.\n• Customer Burden: Often, cleanup is incorrectly left as a "backup restore" job for the customer's IT team, wasting their resources.`,
            contentAr: `• الخطر التشغيلي: يجب أن تتم عملية تنظيف الأجهزة المخترقة بأمان تام دون التسبب في تعطيل العمليات اليومية للعميل.\n• التحقق والتأكيد: تفتقر الممارسات الحالية إلى وجود عملية تنظيف قابلة للتحقق وغير قابلة للإنكار (Non-repudiable).\n• إرهاق العميل (Customer Burden): غالباً ما يُترك عبء التنظيف بشكل خاطئ لفريق الـ IT التابع للعميل عبر طلب "استعادة نسخة احتياطية"، مما يهدر وقتهم ومواردهم.`,
            keywords: {
              'Operational Risk': 'الخطر التشغيلي: محاولة حذف الباب الخلفي الذي زرعته قد تؤدي بالخطأ إلى حذف ملف نظام أساسي، مما يسبب شاشة الموت الزرقاء وتوقف عمل الشركة!',
              'non-repudiable': 'غير قابل للإنكار: مصطلح قانوني أمني. يعني ضرورة وجود سجلات أو أدلة قاطعة تثبت أن فريق الاختبار قد قام فعلاً بإزالة كل آثاره، لكي لا يُتهم لاحقاً بترك ثغرة متعمدة.',
              'Customer Burden': 'إرهاق العميل: أسوأ تصرف للمختبر هو أن يقول للعميل: "لقد أحدثت فوضى في السيرفر، يرجى مسحه واستعادة النسخة الاحتياطية!". هذا عمل غير احترافي ويهدر أموال العميل.'
            },
            summary: {
              en: 'Cleanup carries operational risks and often lacks proper verification. Incorrectly passing this burden onto the client’s IT team to perform backup restores is highly inefficient.',
              ar: 'يحمل التنظيف مخاطر تشغيلية ويفتقر غالباً إلى التحقق المناسب. كما أن إلقاء هذا العبء بشكل غير صحيح على فريق العميل لإجراء استعادة للنسخ الاحتياطية يعتبر أمراً غير فعال للغاية.'
            },
            keyPoints: [
              { ar: 'حذف الآثار يجب ألا يتسبب في انهيار عمليات وأنظمة العميل.', en: 'Removing artifacts must not crash the client\'s operations and systems.' },
              { ar: 'يوجد نقص في الأدلة التي "تُثبت" أن التنظيف قد تم بنسبة 100%.', en: 'There is a lack of evidence to "prove" that cleanup is 100% complete.' },
              { ar: 'يجب ألا يُجبر العميل على استعادة النسخ الاحتياطية لإصلاح فوضى الاختبار.', en: 'The client shouldn\'t be forced into backup restores to fix testing mess.' }
            ],
            mcq: {
              question: 'What is considered a "Customer Burden" during the Cleanup Phase?',
              options: ['Providing network diagrams to testers', 'Paying the final invoice', 'Leaving the cleanup as a "backup restore" job for the client\'s IT team', 'Reading the final executive summary'],
              answer: 2,
              explanation: 'It is unprofessional and wasteful to force the client\'s IT team to perform a backup restore just to clean up the artifacts left by the penetration testers.'
            }
          },
          {
            id: 's23',
            title: '23. Why Automate Penetration Testing?',
            content: `• The Current State: Penetration testing is often a mix of hacker handiwork, monotonous tasks, and non-formal knowledge.\n• The Solution: Automating these tests brings a necessary layer of professionalism to the practice.\n• Human-Centric Focus: Automation allows the human expert to move away from repetitive work and focus on high-level strategy.`,
            contentAr: `• الوضع الحالي: غالباً ما يكون اختبار الاختراق مزيجاً من الحرفية اليدوية للهاكر، المهام الرتيبة والمملة، والمعرفة غير الرسمية (غير الموثقة).\n• الحل: إدخال "الأتمتة" (Automation) على هذه الاختبارات يضفي طبقة ضرورية من الاحترافية والمنهجية على الممارسة.\n• التركيز المتمحور حول الإنسان: تتيح الأتمتة للخبير البشري الابتعاد عن الأعمال المتكررة للتركيز على وضع التكتيكات والاستراتيجيات عالية المستوى.`,
            keywords: {
              'Automate': 'الأتمتة (البرمجة الآلية): استخدام سكربتات (أكواد) برمجية لتنفيذ الخطوات المكررة، مثل فحص 10,000 منفذ شبكة بضغطة زر واحدة، بدلاً من فحصها يدوياً.',
              'monotonous tasks': 'المهام الرتيبة: الأعمال المملة التي تستهلك الوقت دون الحاجة لذكاء. الأتمتة تترك هذه الأعمال للآلة، وتحرر العقل البشري للتفكير في كيفية دمج الثغرات المعقدة.',
              'Human-Centric Focus': 'التركيز على الإنسان: الأتمتة لا تلغي وظيفة الهاكر، بل تعفيه من أداور "العامل اليدوي" ليصبح "المهندس المخطط" الذي يحلل النتائج ويتخذ القرارات الصعبة.'
            },
            summary: {
              en: 'Automating penetration testing transforms it from ad-hoc manual labor into a professional practice, freeing human experts from monotonous tasks to focus on strategic analysis.',
              ar: 'تؤدي أتمتة اختبارات الاختراق إلى تحويلها من عمل يدوي عشوائي إلى ممارسة احترافية، مما يحرر الخبراء البشريين من المهام الرتيبة للتركيز على التحليل الاستراتيجي.'
            },
            keyPoints: [
              { ar: 'الطرق اليدوية التقليدية تستهلك الوقت في مهام رتيبة ומملة.', en: 'Traditional manual methods waste time on monotonous, boring tasks.' },
              { ar: 'الأتمتة (البرمجة) تضفي الاحترافية والموثوقية على عملية التقييم.', en: 'Automation adds professionalism and reliability to the assessment process.' },
              { ar: 'تفريغ العقل البشري للتركيز على التخطيط الاستراتيجي بدلاً من التكرار.', en: 'Frees the human mind to focus on strategic planning instead of repetition.' }
            ],
            mcq: {
              question: 'What is the "Human-Centric" benefit of automating penetration tests?',
              options: ['It replaces human workers entirely', 'It allows experts to move away from repetitive work and focus on high-level strategy', 'It makes computers think like humans', 'It writes reports automatically'],
              answer: 1,
              explanation: 'Automation takes care of the boring, repetitive tasks, freeing up the human expert to do what they do best: strategic analysis and creative attack planning.'
            }
          },
          {
            id: 's24',
            title: '24. What is Automation Good For?',
            content: `• Resource Optimization: Frees up valuable personnel for critical phases:\n• High-level overview and analysis.\n• Strategic attack planning.\n• Results analysis and remediation recommendations.\n• Unified Frameworks: Encompasses all penetration test phases under a single, cohesive framework.\n• Standardization: Helps define and standardize the methodology across different teams and environments.`,
            contentAr: `• تحسين الموارد: تفريغ الكوادر البشرية القيمة للتركيز على المراحل الحاسمة:\n• النظرة العامة والتحليل عالي المستوى.\n• التخطيط الاستراتيجي للهجوم.\n• تحليل النتائج وتقديم توصيات المعالجة.\n• الأطر الموحدة: دمج واحتواء جميع مراحل اختبار الاختراق تحت إطار عمل واحد متماسك (بدلاً من أدوات مبعثرة).\n• التوحيد القياسي (Standardization): يساعد في تحديد وتوحيد المنهجية لضمان عمل جميع الفرق في مختلف البيئات بنفس الكفاءة والمعايير.`,
            keywords: {
              'Resource Optimization': 'تحسين الموارد: استغلال وقت المهندسين ذوي الرواتب العالية في التفكير وحل المشاكل المعمارية، بدلاً من تضييع وقتهم في كتابة أوامر طرفية (Terminal) متكررة.',
              'Unified Frameworks': 'الأطر الموحدة: تخيل برنامجاً واحداً يجمع داخله أداة لجمع المعلومات، وأداة للفحص، وأداة للاستغلال. هذا يوفر تناغماً هائلاً وسرعة في نقل البيانات بين مراحل الهجوم.',
              'Standardization': 'التوحيد القياسي: ضمان الجودة. لو أرسلنا خبيرين مختلفين لاختبار نفس النظام باستخدام الأدوات المؤتمتة ذاتها، سيحصل كلاهما على نفس النتائج الدقيقة، مما يمنع التفاوت البشري.'
            },
            summary: {
              en: 'Automation optimizes resources by freeing experts for strategic planning, integrates tools into a unified framework, and standardizes methodologies across teams.',
              ar: 'تعمل الأتمتة على تحسين الموارد من خلال تفرغ الخبراء للتخطيط الاستراتيجي، وتدمج الأدوات في إطار عمل موحد، وتوحد المنهجيات القياسية عبر الفرق المختلفة.'
            },
            keyPoints: [
              { ar: 'توفر وقت الخبراء للتحليل وكتابة التوصيات المعقدة.', en: 'Saves experts\' time for analysis and writing complex recommendations.' },
              { ar: 'تربط جميع مراحل الهجوم داخل بيئة (برنامج) واحد متكامل.', en: 'Links all attack phases within a single, integrated environment.' },
              { ar: 'توحد معايير العمل فتضمن نفس الجودة بغض النظر عن من يختبر.', en: 'Standardizes procedures to ensure the same quality regardless of the tester.' }
            ],
            mcq: {
              question: 'How does standardization through automation benefit an organization?',
              options: ['It randomizes the test results', 'It helps define and standardize the methodology across different teams', 'It makes the network impossible to hack', 'It requires everyone to use the exact same operating system'],
              answer: 1,
              explanation: 'Standardization ensures that no matter which team does the test, they follow the same cohesive, reliable methodology.'
            }
          },
          {
            id: 's25',
            title: '25. Ensuring Quality and Speed',
            content: `• Quality Assurance: Enforces the following of established methodologies to ensure consistent, high-quality output.\n• Operational Security: Improves the security of the testing practice itself by using vetted, automated scripts.\n• Efficiency: Simplifies and speeds up monotonous, time-consuming tasks (e.g., scanning thousands of ports or verifying cleanup).\n\nThe Bottom Line\nAutomation turns a "craft" into an "engineering discipline."`,
            contentAr: `• ضمان الجودة (QA): يُلزم تطبيق المنهجيات المعتمدة بصرامة لضمان مخرجات ثابتة وعالية الجودة في كل مرة.\n• الأمن التشغيلي: يحسّن من أمان ممارسة الاختبار بحد ذاتها من خلال استخدام سكربتات (نصوص برمجية) آلية موثوقة ومفحوصة مسبقاً (تمنع الأخطاء الكارثية).\n• الكفاءة: يبسط ويسرع المهام الرتيبة التي تستغلك وقتاً طويلاً (مثل فحص آلاف المنافذ أو التحقق من التنظيف).\n\nالخلاصة (The Bottom Line)\n"الأتمتة تحول (حرفة) الهاكرز الفردية إلى (نظام هندسي) مؤسسي صارم."`,
            keywords: {
              'Quality Assurance': 'ضمان الجودة: عندما يكون الكود الآلي هو من ينفذ الفحص، فلا مجال لنسيان خطوة أو تخطي إجراء بسبب إرهاق الموظف. النتيجة دائماً دقيقة ومضمونة.',
              'Operational Security': 'الأمن التشغيلي: استخدام سكربتات جاهزة ومختبرة مسبقاً (Vetted) يضمن أن البرنامج لن ينهار أو يعطل أجهزة العميل بالخطأ أثناء الهجوم التجريبي.',
              'engineering discipline': 'نظام هندسي: انتقال الأمن السيبراني من مرحلة "الفن" الذي يعتمد على الموهبة الفردية للهاكر، إلى مرحلة "الهندسة" التي تعتمد على عمليات رياضية وبرمجية قابلة للقياس والتكرار.'
            },
            summary: {
              en: 'Automation ensures quality, enhances operational security with vetted scripts, and drastically improves efficiency. Ultimately, it evolves penetration testing from a mere craft into a rigorous engineering discipline.',
              ar: 'تضمن الأتمتة الجودة، وتعزز الأمن التشغيلي بنصوص برمجية موثوقة، وتحسن الكفاءة بشكل كبير. في النهاية، هي تطور اختبار الاختراق من مجرد حرفة إلى تخصص هندسي صارم.'
            },
            keyPoints: [
              { ar: 'ضمان الجودة: تمنع الأتمتة الأخطاء البشرية والنسيان أثناء الفحص.', en: 'Quality Assurance: Automation prevents human errors and oversights during scanning.' },
              { ar: 'تأمين الفحص: السكربتات المعتمدة لا تدمر أنظمة العميل بالخطأ.', en: 'Securing the test: Vetted scripts do not accidentally destroy client systems.' },
              { ar: 'تحول الاختراق من مهارة فردية (حرفة) إلى نظام (علم هندسي) مؤسسي.', en: 'Transforms hacking from an individual skill (craft) into a corporate system (engineering).' }
            ],
            mcq: {
              question: 'According to the presentation, what is "The Bottom Line" regarding automation?',
              options: ['It replaces the need for reporting', 'It turns a "craft" into an "engineering discipline"', 'It is too expensive for small companies', 'It only works against Windows servers'],
              answer: 1,
              explanation: 'The slide concludes that automation formalizes the process, transforming it from ad-hoc manual hacking (a craft) into a structured, reliable engineering discipline.'
            }

        function App() {
          const [activeSlideId, setActiveSlideId] = useState(slidesData[0].id);
          const [modalData, setModalData] = useState(null);
          const [mcqState, setMcqState] = useState({});
          const [showTranslation, setShowTranslation] = useState(false);

          const activeSlide = slidesData.find(s => s.id === activeSlideId);

          useEffect(() => {
            setShowTranslation(false);
          }, [activeSlideId]);

          const renderContentWithKeywords = (text, keywordsMap) => {
            if (!keywordsMap || Object.keys(keywordsMap).length === 0) return text;
            const sortedKeywords = Object.keys(keywordsMap).sort((a, b) => b.length - a.length);
            const regex = new RegExp(`(${sortedKeywords.join('|')})`, 'gi');
            const parts = text.split(regex);
            
            return parts.map((part, index) => {
              const keywordKey = Object.keys(keywordsMap).find(k => k.toLowerCase() === part.toLowerCase());
              if (keywordKey) {
                return (
                  <span 
                    key={index} 
                    onClick={() => setModalData({ type: 'keyword', data: { word: part, meaning: keywordsMap[keywordKey] }})}
                    className="group relative inline-flex items-baseline cursor-pointer font-bold text-indigo-700 hover:text-indigo-900 transition-all duration-200 mx-1 px-1 rounded hover:bg-indigo-50 border-b-2 border-dashed border-indigo-400"
                    title="انقر لفهم المفهوم بعمق"
                  >
                    {part}
                    <span className="absolute -top-1 -right-2 flex h-3 w-3">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-3 w-3 bg-indigo-500 text-[8px] font-bold text-white justify-center items-center">?</span>
                    </span>
                  </span>
                );
              }
              return <span key={index}>{part}</span>;
            });
          };

          const handleMcqSelect = (optionIndex) => {
            setMcqState({ ...mcqState, [activeSlideId]: optionIndex });
          };

          return (
            <div className="flex flex-col md:flex-row h-screen bg-gray-50 text-gray-800 font-sans" dir="ltr">
              <div className="w-full md:w-1/4 bg-slate-900 text-white overflow-y-auto shadow-2xl z-10 flex flex-col">
                <div className="p-5 bg-slate-800 text-center border-b border-slate-700 sticky top-0 shadow-sm z-20">
                  <div className="font-extrabold text-xl tracking-wide text-indigo-400" dir="rtl">المحاضرة 2</div>
                  <div className="text-xs font-medium text-slate-400 mt-2 uppercase tracking-widest">CYBS60201: PTES & Automation</div>
                </div>
                <ul className="flex-1 px-3 py-5 space-y-3">
                  {slidesData.map(slide => (
                    <li key={slide.id}>
                      <button
                        onClick={() => {
                          setActiveSlideId(slide.id);
                          window.scrollTo(0, 0);
                        }}
                        className={`w-full text-left px-4 py-3.5 rounded-xl transition-all duration-300 font-medium text-sm ${
                          activeSlideId === slide.id 
                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 scale-[1.02]' 
                            : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-100'
                        }`}
                      >
                        {slide.title}
                      </button>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="w-full md:w-3/4 flex flex-col h-screen overflow-y-auto bg-slate-50">
                <div className="flex-1 p-6 md:p-10 max-w-4xl mx-auto w-full">
                  <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-8 pb-6 border-b-2 border-slate-200 gap-4">
                    <h1 className="text-3xl font-extrabold text-slate-800 leading-tight">
                      {activeSlide.title}
                    </h1>
                    <div className="flex gap-3 self-end sm:self-auto shrink-0">
                      <button 
                        onClick={() => setShowTranslation(!showTranslation)}
                        className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold transition-all shadow-sm border-2 ${
                          showTranslation 
                            ? 'bg-emerald-100 text-emerald-700 border-emerald-300 hover:bg-emerald-200' 
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 hover:text-slate-900'
                        }`}
                      >
                        <TranslateIcon />
                        <span className="text-sm">{showTranslation ? 'Hide Arabic' : 'عربي'}</span>
                      </button>
                      <button 
                        onClick={() => setModalData({ type: 'summary', data: activeSlide.summary })}
                        className="flex items-center gap-2 px-4 py-2 rounded-full bg-amber-100 text-amber-700 border-2 border-amber-300 hover:bg-amber-200 hover:text-amber-800 transition-all shadow-sm font-bold"
                      >
                        <AlertIcon />
                        <span className="text-sm uppercase tracking-wider">Summary</span>
                      </button>
                    </div>
                  </div>

                  <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-6 text-lg leading-loose whitespace-pre-wrap text-slate-700 font-medium">
                    {renderContentWithKeywords(activeSlide.content, activeSlide.keywords)}
                  </div>

                  <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showTranslation ? 'max-h-[1000px] opacity-100 mb-8' : 'max-h-0 opacity-0 mb-0'}`}>
                    <div className="bg-emerald-50 p-8 rounded-2xl border-r-4 border-emerald-500 shadow-sm text-right whitespace-pre-wrap text-emerald-900 text-xl leading-loose font-medium" dir="rtl">
                      {activeSlide.contentAr}
                    </div>
                  </div>

                  <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm mt-8">
                    <h3 className="text-2xl font-bold mb-6 flex items-center text-slate-800">
                      <span className="bg-indigo-100 text-indigo-700 w-10 h-10 rounded-xl flex justify-center items-center mr-4 text-sm font-black shadow-inner">Q</span>
                      Knowledge Check
                    </h3>
                    <p className="font-semibold text-lg text-slate-700 mb-6">{activeSlide.mcq.question}</p>
                    <div className="space-y-3">
                      {activeSlide.mcq.options.map((opt, idx) => {
                        const isSelected = mcqState[activeSlideId] === idx;
                        const isCorrect = idx === activeSlide.mcq.answer;
                        const showResult = mcqState[activeSlideId] !== undefined;
                        
                        let btnStyle = "bg-slate-50 border-slate-200 hover:bg-slate-100 hover:border-slate-300 text-slate-700";
                        if (showResult) {
                          if (isCorrect) btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 font-bold shadow-sm";
                          else if (isSelected && !isCorrect) btnStyle = "bg-rose-50 border-rose-400 text-rose-800 font-semibold";
                          else btnStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                        }
                        return (
                          <button
                            key={idx}
                            disabled={showResult}
                            onClick={() => handleMcqSelect(idx)}
                            className={`w-full text-left px-6 py-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between ${btnStyle}`}
                          >
                            <span>{opt}</span>
                            {showResult && isCorrect && <span className="text-emerald-600 bg-emerald-100 p-1 rounded-md"><CheckIcon /></span>}
                            {showResult && isSelected && !isCorrect && <span className="text-rose-500 bg-rose-100 p-1 rounded-md"><CrossIcon /></span>}
                          </button>
                        );
                      })}
                    </div>
                    {mcqState[activeSlideId] !== undefined && (
                      <div className={`mt-6 p-5 rounded-xl border-2 animate-fadeIn ${mcqState[activeSlideId] === activeSlide.mcq.answer ? 'bg-emerald-50 border-emerald-200' : 'bg-indigo-50 border-indigo-200'}`}>
                        <div className="flex items-center gap-2 mb-2">
                          <LightBulbIcon />
                          <p className="font-bold text-slate-800">Explanation:</p>
                        </div>
                        <p className="text-slate-700 font-medium leading-relaxed">{activeSlide.mcq.explanation}</p>
                      </div>
                    )}
                  </div>

                  <div className="bg-white p-0 rounded-2xl border border-slate-200 shadow-sm mt-8 overflow-hidden">
                    <div className="bg-amber-50 px-6 py-4 border-b border-amber-100 flex items-center gap-3" dir="rtl">
                      <span className="bg-amber-100 text-amber-600 p-2 rounded-lg shadow-sm">
                        <LightBulbIcon />
                      </span>
                      <h3 className="text-xl font-bold text-amber-900">نقاط يجدر بك معرفتها</h3>
                    </div>
                    <div className="overflow-x-auto p-4">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="border-b-2 border-slate-200">
                            <th className="p-4 font-bold text-slate-800 text-right w-1/2 bg-slate-50 rounded-tr-lg" dir="rtl">الملخص (عربي)</th>
                            <th className="p-4 font-bold text-slate-800 w-1/2 bg-slate-50 rounded-tl-lg">Takeaway (English)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {activeSlide.keyPoints.map((point, index) => (
                            <tr key={index} className="border-b border-slate-100 hover:bg-slate-50 transition-colors duration-150">
                              <td className="p-4 text-slate-700 text-right font-medium leading-relaxed" dir="rtl">{point.ar}</td>
                              <td className="p-4 text-slate-700 font-medium leading-relaxed">{point.en}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>

              {modalData && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn" onClick={() => setModalData(null)}>
                  <div 
                    className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden transform transition-all scale-100"
                    onClick={e => e.stopPropagation()}
                  >
                    <div className={`flex justify-between items-center p-5 border-b-2 ${modalData.type === 'keyword' ? 'bg-indigo-50 border-indigo-100' : 'bg-amber-50 border-amber-100'}`}>
                      <h3 className={`text-xl font-black ${modalData.type === 'keyword' ? 'text-indigo-800' : 'text-amber-800'}`} dir="rtl">
                        {modalData.type === 'keyword' ? 'شرح المفهوم العلمي' : 'الملخص التنفيذي'}
                      </h3>
                      <button onClick={() => setModalData(null)} className="text-slate-400 hover:text-rose-500 bg-white p-2 rounded-full hover:bg-rose-50 transition-colors shadow-sm border border-slate-200">
                        <CloseIcon />
                      </button>
                    </div>
                    <div className="p-8">
                      {modalData.type === 'keyword' && (
                        <div dir="rtl" className="text-right">
                          <div className="inline-block bg-indigo-600 text-white text-xl font-bold mb-5 px-4 py-2 rounded-lg font-mono tracking-wide shadow-md" dir="ltr">
                            {modalData.data.word}
                          </div>
                          <div className="text-lg text-slate-700 leading-loose font-medium border-r-4 border-indigo-400 pl-4 pr-6 bg-slate-50 py-4 rounded-l-xl">
                            {modalData.data.meaning}
                          </div>
                        </div>
                      )}
                      {modalData.type === 'summary' && (
                        <div className="space-y-8">
                          <div className="relative p-6 rounded-2xl border-2 border-slate-200 bg-white">
                            <span className="absolute -top-4 left-4 bg-slate-800 text-white text-xs font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">English</span>
                            <p className="text-slate-700 leading-relaxed font-medium text-lg mt-2">{modalData.data.en}</p>
                          </div>
                          <div className="relative p-6 rounded-2xl border-2 border-amber-200 bg-amber-50/50" dir="rtl">
                            <span className="absolute -top-4 right-4 bg-amber-500 text-white text-xs font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm">عربي</span>
                            <p className="text-amber-950 leading-relaxed font-medium text-lg mt-2 text-right">{modalData.data.ar}</p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // --- أمر تشغيل التطبيق في الصفحة ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
