<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating System Security - Al-Baha University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f4f6;
            overflow-x: hidden;
        }

        :lang(ar) {
            font-family: 'Cairo', sans-serif;
        }

        .slide-container {
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #1a56db; /* Blue accent */
            border-bottom: 8px solid #10b981; /* Green accent */
            min-height: 500px;
            position: relative;
        }

        .keyword {
            background-color: #fef08a;
            color: #b45309;
            padding: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 2px dashed #b45309;
        }

        .keyword:hover {
            background-color: #fde047;
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .close-btn:hover { color: #111827; }

        .diagram-box {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
            text-align: center;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            font-weight: bold;
        }

        .quiz-question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .correct-answer { color: #16a34a; font-weight: bold; }
        .wrong-answer { color: #dc2626; font-weight: bold; }

        /* Slide specific typography */
        .slide-title { color: #1e3a8a; font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem;}
        .slide-list { list-style-type: none; padding-left: 1.5rem; }
        .slide-list > li { margin-bottom: 1rem; font-size: 1.25rem; position: relative;}
        .slide-list > li::before { content: '■'; color: #3b82f6; position: absolute; left: -1.5rem; top: 0.2rem; font-size: 0.8rem;}
        .slide-sublist { list-style-type: circle; padding-left: 2rem; margin-top: 0.5rem;}
        .slide-sublist > li { font-size: 1.1rem; margin-bottom: 0.5rem; color: #4b5563;}

    </style>
</head>
<body class="flex h-screen text-gray-800">

    <!-- Sidebar -->
    <aside class="w-1/4 bg-gray-900 text-white flex flex-col h-full overflow-hidden shadow-xl z-10 transition-all duration-300" id="sidebar">
        <div class="p-6 border-b border-gray-700 bg-gray-800">
            <h1 class="text-xl font-bold text-blue-400 mb-2">Operating System Security</h1>
            <p class="text-sm text-gray-400">Al-Baha University</p>
        </div>
        <div class="flex-1 overflow-y-auto" id="slide-list-container">
            <ul id="slide-nav" class="py-2">
                <!-- Navigation items injected via JS -->
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative bg-gray-100 overflow-y-auto transition-all duration-300" id="main-content">
        <!-- Top Toolbar -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <button id="toggle-sidebar" class="text-gray-500 hover:text-blue-600 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex gap-4">
                <button id="lang-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition">
                    <i class="fas fa-language"></i> <span id="lang-text">ترجمة للعربية</span>
                </button>
                <button id="quiz-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition">
                    <i class="fas fa-question-circle"></i> <span>Take Quiz</span>
                </button>
            </div>
        </header>

        <!-- Slide Area -->
        <div class="flex-1 p-8 flex justify-center items-start overflow-y-auto">
            <div class="slide-container w-full max-w-4xl p-10 flex flex-col" id="slide-content">
                <!-- Slide content injected here -->
            </div>
        </div>
    </main>

    <!-- Keyword Modal -->
    <div id="keyword-modal" class="modal-overlay">
        <div class="modal-content text-center">
            <i class="fas fa-times close-btn text-2xl" onclick="closeModal('keyword-modal')"></i>
            <h2 id="kw-title" class="text-2xl font-bold text-blue-800 mb-4 pb-2 border-b"></h2>
            <div class="bg-blue-50 p-4 rounded-lg mb-4 text-left">
                <p class="text-sm font-bold text-blue-600 uppercase mb-1">English Definition:</p>
                <p id="kw-en" class="text-lg"></p>
            </div>
            <div class="bg-green-50 p-4 rounded-lg text-right" dir="rtl">
                <p class="text-sm font-bold text-green-600 mb-1">الشرح بالعربية:</p>
                <p id="kw-ar" class="text-lg font-cairo"></p>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="modal-overlay">
        <div class="modal-content w-full max-w-3xl">
            <i class="fas fa-times close-btn text-2xl" onclick="closeModal('quiz-modal')"></i>
            <h2 class="text-2xl font-bold text-indigo-800 mb-6 border-b pb-2"><i class="fas fa-pencil-alt mr-2"></i> Slide Quiz</h2>
            <div id="quiz-container" class="space-y-6">
                <!-- Quiz forms injected here -->
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="evaluateQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow transition">Submit Answers</button>
            </div>
            <div id="quiz-results" class="mt-6 hidden"></div>
        </div>
    </div>

    <script>
        // --- 1. DATA STRUCTURE (All Content, Translations, Keywords, Quizzes) ---
        const dictionary = {
            // Part 1 Keywords
            "Operating System": { en: "A program that acts as an intermediary between a user of a computer and the computer hardware.", ar: "برنامج يعمل كوسيط بين مستخدم جهاز الكمبيوتر وأجهزة الكمبيوتر (العتاد)." },
            "Multiprogramming": { en: "Organizes jobs (code and data) so CPU always has one to execute.", ar: "تنظيم المهام (التعليمات البرمجية والبيانات) بحيث يكون لدى وحدة المعالجة المركزية دائمًا مهمة لتنفيذها." },
            "Multitasking": { en: "Logical extension of multiprogramming in which CPU switches jobs so frequently that users can interact with each job while it is running.", ar: "امتداد منطقي للبرمجة المتعددة حيث تبدل وحدة المعالجة المركزية بين المهام بشكل متكرر بحيث يمكن للمستخدمين التفاعل مع كل مهمة أثناء تشغيلها." },
            "Hardware": { en: "Provides basic computing resources (CPU, memory, I/O devices).", ar: "يوفر موارد الحوسبة الأساسية (وحدة المعالجة المركزية، الذاكرة، أجهزة الإدخال/الإخراج)." },
            "Application programs": { en: "Define the ways in which the system resources are used to solve the computing problems of the users.", ar: "تحدد الطرق التي يتم بها استخدام موارد النظام لحل مشاكل الحوسبة للمستخدمين." },
            "resource allocator": { en: "Manages all resources: CPU time, memory space, file-storage space, I/O.", ar: "يدير جميع الموارد: وقت المعالج، مساحة الذاكرة، مساحة تخزين الملفات، والإدخال/الإخراج." },
            "control program": { en: "Controls execution of programs to prevent errors and improper use of the computer.", ar: "يتحكم في تنفيذ البرامج لمنع الأخطاء والاستخدام غير السليم للكمبيوتر." },
            "bootstrap program": { en: "Simple code loaded at power-up or reboot to initialize the system and load the kernel.", ar: "كود بسيط يتم تحميله عند التشغيل أو إعادة التشغيل لتهيئة النظام وتحميل النواة." },
            "kernel": { en: "The core of the operating system that loads and starts execution.", ar: "جوهر نظام التشغيل الذي يتم تحميله ويبدأ التنفيذ." },
            "daemons": { en: "Services provided outside of the kernel, started by the kernel.", ar: "خدمات يتم توفيرها خارج النواة، وتبدأ بواسطة النواة." },
            "interrupt": { en: "A signal to the CPU driven by hardware or software.", ar: "إشارة إلى وحدة المعالجة المركزية مدفوعة بالأجهزة أو البرامج." },
            "system call": { en: "Request for operating system service.", ar: "طلب خدمة من نظام التشغيل." },
            "job scheduling": { en: "The process of selecting one job to run from the subset of total jobs kept in memory.", ar: "عملية اختيار مهمة واحدة لتشغيلها من مجموعة المهام الإجمالية المحفوظة في الذاكرة." },
            "interactive computing": { en: "A consequence of timesharing allowing user interaction with running jobs.", ar: "نتيجة للمشاركة الزمنية تتيح تفاعل المستخدم مع المهام قيد التشغيل." },
            "Virtual memory": { en: "Allows execution of processes not completely in memory.", ar: "يسمح بتنفيذ العمليات غير الموجودة بالكامل في الذاكرة." },
            "process": { en: "A program in execution. It is an active entity.", ar: "برنامج قيد التنفيذ. وهو كيان نشط." },
            "program counter": { en: "Specifies the location of the next instruction to execute.", ar: "يحدد موقع التعليمة التالية المراد تنفيذها." },
            "Concurrency": { en: "Multiplexing the CPUs among the processes/threads.", ar: "تعدد إرسال وحدات المعالجة المركزية بين العمليات / الخيوط." },
            "file": { en: "Abstracts physical properties to logical storage unit.", ar: "يستخلص الخصائص المادية إلى وحدة تخزين منطقية." },
            "Backup": { en: "Saving files onto stable (non-volatile) storage media.", ar: "حفظ الملفات على وسائط تخزين ثابتة (غير متطايرة)." },
            "Virtualization": { en: "Allows operating systems to run applications within other OSes.", ar: "يسمح لأنظمة التشغيل بتشغيل التطبيقات داخل أنظمة تشغيل أخرى." },
            "VMM": { en: "Virtual Machine Manager provides virtualization services.", ar: "مدير الآلة الافتراضية يوفر خدمات المحاكاة الافتراضية." },
            "host": { en: "The native operating system running on the hardware.", ar: "نظام التشغيل الأساسي الذي يعمل على الأجهزة." },
            "guest": { en: "An operating system running virtually inside a host OS.", ar: "نظام تشغيل يعمل بشكل افتراضي داخل نظام تشغيل مضيف." },
            "Distributed computing": { en: "Collection of separate, possibly heterogeneous, systems networked together.", ar: "مجموعة من الأنظمة المنفصلة، وربما غير المتجانسة، متصلة بشبكة معًا." },
            "Client-Server": { en: "Model where systems act as servers responding to requests generated by clients.", ar: "نموذج حيث تعمل الأنظمة كخوادم تستجيب للطلبات التي يولدها العملاء." },
            "Peer-to-Peer": { en: "P2P model does not distinguish clients and servers; all nodes are peers.", ar: "نموذج الند للند لا يميز بين العملاء والخوادم؛ جميع العقد أقران." },
            "Cloud computing": { en: "Delivers computing, storage, even apps as a service across a network.", ar: "يقدم الحوسبة والتخزين وحتى التطبيقات كخدمة عبر شبكة." },
            "SaaS": { en: "Software as a Service - applications available via the Internet.", ar: "البرمجيات كخدمة - تطبيقات متاحة عبر الإنترنت." },
            "Real-time embedded systems": { en: "Computers with well-defined fixed time constraints.", ar: "أجهزة كمبيوتر ذات قيود زمنية ثابتة ومحددة جيدًا." },

            // Part 2 Keywords
            "batch systems": { en: "Systems that originally only permitted one process to be run at a time.", ar: "أنظمة كانت تسمح في الأصل بتشغيل عملية واحدة فقط في كل مرة." },
            "timesharing systems": { en: "Systems where multiple processes run concurrently and share the CPU time.", ar: "أنظمة تعمل فيها عمليات متعددة بشكل متزامن وتتشارك وقت وحدة المعالجة المركزية." },
            "resource mechanisms": { en: "Mechanisms like file systems and memory management that define how processes use hardware.", ar: "آليات مثل أنظمة الملفات وإدارة الذاكرة التي تحدد كيفية استخدام العمليات للأجهزة." },
            "scheduling": { en: "The responsibility of switching among processes fairly for good performance.", ar: "مسؤولية التبديل بين العمليات بإنصاف لتحقيق أداء جيد." },
            "constrained systems": { en: "Systems that can enforce security goals with a high degree of assurance.", ar: "أنظمة يمكنها فرض أهداف الأمان بدرجة عالية من الضمان." },
            "general-purpose systems": { en: "Systems that can enforce limited security goals with a low to medium degree of assurance.", ar: "أنظمة تفرض أهدافًا أمنية محدودة بدرجة ضمان منخفضة إلى متوسطة." },
            "secure operating system": { en: "Provides security mechanisms ensuring system's security goals are enforced despite threats.", ar: "يوفر آليات أمان تضمن فرض أهداف الأمان للنظام على الرغم من التهديدات." },
            "security goals": { en: "Define the operations that can be executed by a system while preventing unauthorized access.", ar: "تحدد العمليات التي يمكن للنظام تنفيذها مع منع الوصول غير المصرح به." },
            "secrecy": { en: "Requirements that limit the objects that individual subjects can read.", ar: "متطلبات تقيد الكائنات التي يمكن للأشخاص/الموضوعات قراءتها." },
            "integrity": { en: "Requirements that limit the objects that subjects can write.", ar: "متطلبات تقيد الكائنات التي يمكن للأشخاص/الموضوعات تعديلها أو الكتابة عليها." },
            "availability": { en: "Requirements that limit the system resources that subjects may consume.", ar: "متطلبات تقيد موارد النظام التي يمكن للأشخاص/الموضوعات استهلاكها." },
            "subjects": { en: "Entities such as processes and users that perform operations.", ar: "كيانات مثل العمليات والمستخدمين التي تنفذ العمليات." },
            "objects": { en: "Entities such as files and sockets that are operated upon.", ar: "كيانات مثل الملفات والمقابس التي يتم إجراء العمليات عليها." },
            "TCB": { en: "Trusted Computing Base; the set of software and data upon which the system depends for correct security enforcement.", ar: "قاعدة الحوسبة الموثوقة؛ مجموعة البرامج والبيانات التي يعتمد عليها النظام لفرض الأمان بشكل صحيح." },
            "threat model": { en: "Defines a set of operations that an attacker may use to compromise a system.", ar: "يحدد مجموعة من العمليات التي قد يستخدمها المهاجم لاختراق نظام ما." },
            "trust model": { en: "Defines the set of software and data upon which the system depends for correct enforcement of security goals.", ar: "يحدد مجموعة البرامج والبيانات التي يعتمد عليها النظام لفرض أهداف الأمان بشكل صحيح." }
        };

        function kw(word) {
            return `<span class="keyword" onclick="showKeyword('${word}')">${word}</span>`;
        }

        const slides = [
            // ================== PART 1 SLIDES ==================
            {
                id: 2,
                titleEn: "Outlines (Part 1)",
                titleAr: "المحتويات (الجزء الأول)",
                contentEn: `
                    <h2 class="slide-title">Outlines:</h2>
                    <ul class="slide-list">
                        <li>Computer System Structure.</li>
                        <li>What is an ${kw('Operating System')}?</li>
                        <li>${kw('Multiprogramming')} and ${kw('Multitasking')}.</li>
                        <li>Process Management.</li>
                        <li>Memory Management.</li>
                        <li>File-system Management.</li>
                        <li>Mass-Storage Management.</li>
                        <li>${kw('Virtualization')}.</li>
                        <li>Distributed Systems.</li>
                        <li>Computing Environments.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">المحتويات:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>هيكل نظام الكمبيوتر.</li>
                        <li>ما هو ${kw('Operating System')}؟</li>
                        <li>${kw('Multiprogramming')} و ${kw('Multitasking')}.</li>
                        <li>إدارة العمليات.</li>
                        <li>إدارة الذاكرة.</li>
                        <li>إدارة نظام الملفات.</li>
                        <li>إدارة التخزين الشامل.</li>
                        <li>${kw('Virtualization')}.</li>
                        <li>الأنظمة الموزعة.</li>
                        <li>بيئات الحوسبة.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which of the following is included in the outlines?", options: ["Database Design", "Virtualization", "Web Development", "Network Routing"], ans: 1 },
                    { type: 'mcq', q: "Which management topic is listed in the outline?", options: ["User Management", "Cable Management", "File-system Management", "Power Management"], ans: 2 },
                    { type: 'tf', q: "Multiprogramming and Multitasking are part of the course outlines.", ans: "true" },
                    { type: 'tf', q: "Hardware maintenance is explicitly listed in the outlines.", ans: "false" },
                    { type: 'short', q: "Name one type of 'Management' listed in the outline.", ans: "Process Management / Memory Management / File-system Management / Mass-Storage Management" },
                    { type: 'short', q: "What is the topic mentioned before 'Distributed Systems'?", ans: "Virtualization" }
                ]
            },
            {
                id: 3,
                titleEn: "Computer System Structure",
                titleAr: "هيكل نظام الكمبيوتر",
                contentEn: `
                    <h2 class="slide-title">Computer System Structure</h2>
                    <p class="mb-4 text-lg">Computer system can be divided into four components:</p>
                    <ul class="slide-list">
                        <li><strong>${kw('Hardware')}</strong> - provides basic computing resources
                            <ul class="slide-sublist"><li>CPU, memory, I/O devices</li></ul>
                        </li>
                        <li><strong>${kw('Operating System')}</strong>
                            <ul class="slide-sublist"><li>Controls and coordinates use of hardware among various applications and users</li></ul>
                        </li>
                        <li><strong>${kw('Application programs')}</strong> - define the ways in which the system resources are used to solve the computing problems of the users
                            <ul class="slide-sublist"><li>Word processors, compilers, web browsers, database systems, video games</li></ul>
                        </li>
                        <li><strong>Users</strong>
                            <ul class="slide-sublist"><li>People, machines, other computers</li></ul>
                        </li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">هيكل نظام الكمبيوتر</h2>
                    <p class="mb-4 text-lg" dir="rtl">يمكن تقسيم نظام الكمبيوتر إلى أربعة مكونات:</p>
                    <ul class="slide-list" dir="rtl">
                        <li><strong>${kw('Hardware')} (الأجهزة)</strong> - توفر موارد الحوسبة الأساسية
                            <ul class="slide-sublist"><li>وحدة المعالجة المركزية، الذاكرة، أجهزة الإدخال/الإخراج</li></ul>
                        </li>
                        <li><strong>${kw('Operating System')} (نظام التشغيل)</strong>
                            <ul class="slide-sublist"><li>يتحكم وينسق استخدام الأجهزة بين مختلف التطبيقات والمستخدمين</li></ul>
                        </li>
                        <li><strong>${kw('Application programs')} (برامج التطبيقات)</strong> - تحدد الطرق التي يتم بها استخدام موارد النظام لحل مشاكل الحوسبة للمستخدمين
                            <ul class="slide-sublist"><li>معالجات النصوص، المترجمات، متصفحات الويب، أنظمة قواعد البيانات، ألعاب الفيديو</li></ul>
                        </li>
                        <li><strong>المستخدمون</strong>
                            <ul class="slide-sublist"><li>أشخاص، آلات، أجهزة كمبيوتر أخرى</li></ul>
                        </li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which component provides basic computing resources?", options: ["Operating System", "Users", "Hardware", "Application programs"], ans: 2 },
                    { type: 'mcq', q: "What defines the ways system resources are used to solve computing problems?", options: ["Hardware", "Application programs", "CPU", "Memory"], ans: 1 },
                    { type: 'tf', q: "Users of a computer system can only be people.", ans: "false" },
                    { type: 'tf', q: "Compilers and web browsers are examples of application programs.", ans: "true" },
                    { type: 'short', q: "Name the four components a computer system can be divided into.", ans: "Hardware, Operating system, Application programs, Users" },
                    { type: 'short', q: "What does the operating system coordinate the use of?", ans: "hardware" }
                ]
            },
            {
                id: 4,
                titleEn: "Abstract View of Components",
                titleAr: "عرض مجرد للمكونات",
                contentEn: `
                    <h2 class="slide-title">Abstract View of Components of Computer</h2>
                    <div class="flex flex-col items-center mt-8 w-full max-w-lg mx-auto space-y-4">
                        <div class="diagram-box w-1/2 bg-blue-100 border-blue-400">User</div>
                        <i class="fas fa-arrows-alt-v text-gray-500 text-xl"></i>

                            <ul class="slide-sublist"><li>Process executes instructions sequentially, one at a time, until completion</li></ul>

                        <li>Multi-threaded process has one program counter per thread</li>
                        <li>Typically, system has many processes, some user, some operating system running concurrently on one or more CPUs</li>
                        <li>${kw('Concurrency')} by multiplexing the CPUs among the processes / threads</li>
                    </ul>

                        <li>A security goal defines a requirement that the system's design can satisfy (e.g., the way pseudocode can be proven to fulfill the complexity requirement) and that a correct implementation must fulfill (e.g., the way that an implementation can be proven experimentally to observe the complexity).</li>

                        <li>يتم تحديد وصول النظام تقليديًا من حيث أي الـ ${kw('subjects')} (الأشخاص/الموضوعات مثل العمليات والمستخدمين) يمكنهم تنفيذ أي عمليات (مثل القراءة والكتابة) على أي ${kw('objects')} (كائنات مثل الملفات والمقابس).</li>
                        <li>متطلبات <strong>السرية (Secrecy)</strong> تحد من الكائنات التي يمكن للمواضيع الفردية قراءتها لأن الكائنات قد تحتوي على أسرار لا يُسمح لجميع المواضيع بمعرفتها.</li>
                        <li>متطلبات <strong>النزاهة (Integrity)</strong> تحد من الكائنات التي يمكن للمواضيع الكتابة عليها لأن الكائنات قد تحتوي على معلومات تعتمد عليها مواضيع أخرى لعملها الصحيح. قد لا يتم الوثوق ببعض المواضيع لتعديل تلك الكائنات.</li>
                        <li>متطلبات <strong>التوافر (Availability)</strong> تحد من موارد النظام (مثل التخزين ووحدة المعالجة المركزية) التي قد تستهلكها المواضيع لأنها قد تستنفد هذه الموارد.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which requirement limits what subjects can read?", options: ["Integrity", "Availability", "Secrecy", "Authenticity"], ans: 2 },
                    { type: 'mcq', q: "Which requirement limits what subjects can write?", options: ["Secrecy", "Integrity", "Availability", "Privacy"], ans: 1 },
                    { type: 'tf', q: "Users are examples of objects.", ans: "false" },
                    { type: 'tf', q: "Availability requirements limit the system resources subjects may consume.", ans: "true" },
                    { type: 'short', q: "What requirement limits the CPU a subject may consume?", ans: "Availability" },
                    { type: 'short', q: "Give an example of a subject.", ans: "processes / users" }
                ]
            },
            {
                id: 40,
                titleEn: "Trust Model",
                titleAr: "نموذج الثقة",
                contentEn: `
                    <h2 class="slide-title">TRUST MODEL</h2>
                    <ul class="slide-list">
                        <li>A system's ${kw('trust model')} defines the set of software and data upon which the system depends for correct enforcement of system security goals. For an operating system, its trust model is synonymous with the system's trusted computing base (${kw('TCB')}).</li>
                        <li>Ideally, a system TCB should consist of the minimal amount of software necessary to enforce the security goals correctly.</li>
                        <li>The software that must be trusted includes the software that defines the security goals and the software that enforces the security goals (i.e., the operating system's security mechanism).</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">نموذج الثقة (TRUST MODEL)</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>يحدد ${kw('trust model')} (نموذج الثقة) للنظام مجموعة البرامج والبيانات التي يعتمد عليها النظام لفرض أهداف أمان النظام بشكل صحيح. بالنسبة لنظام التشغيل، فإن نموذج الثقة الخاص به مرادف لقاعدة الحوسبة الموثوقة للنظام (${kw('TCB')}).</li>
                        <li>من الناحية المثالية، يجب أن تتكون TCB الخاصة بالنظام من الحد الأدنى من البرامج اللازمة لفرض أهداف الأمان بشكل صحيح.</li>
                        <li>تتضمن البرامج التي يجب الوثوق بها البرامج التي تحدد أهداف الأمان والبرامج التي تفرض أهداف الأمان (أي آلية أمان نظام التشغيل).</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "For an OS, the trust model is synonymous with what acronym?", options: ["CPU", "TCB", "LAN", "VMM"], ans: 1 },
                    { type: 'mcq', q: "Ideally, the TCB should consist of what amount of software?", options: ["Maximum", "All software", "Minimal", "None"], ans: 2 },
                    { type: 'tf', q: "TCB stands for Trusted Computing Base.", ans: "true" },
                    { type: 'tf', q: "The TCB includes software that tries to break the security goals.", ans: "false" },
                    { type: 'short', q: "What does TCB stand for?", ans: "Trusted Computing Base" },
                    { type: 'short', q: "What defines the set of software depended upon for correct enforcement?", ans: "trust model" }
                ]
            },
            {
                id: 41,
                titleEn: "Trust Outside OS",
                titleAr: "الثقة خارج نظام التشغيل",
                contentEn: `
                    <h2 class="slide-title">Cont..</h2>
                    <ul class="slide-list">
                        <li>Variety of software running outside the operating system must be trusted.</li>
                        <li>For example, the operating system depends on a variety of programs to authenticate the identity of users (e.g., login and SSH).</li>
                        <li>Such programs must be trusted because correct enforcement of security goals depends on correct identification of users.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">يتبع..</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>يجب الوثوق بمجموعة متنوعة من البرامج التي تعمل خارج نظام التشغيل.</li>
                        <li>على سبيل المثال، يعتمد نظام التشغيل على مجموعة متنوعة من البرامج لمصادقة هوية المستخدمين (مثل تسجيل الدخول و SSH).</li>
                        <li>يجب الوثوق بمثل هذه البرامج لأن الفرض الصحيح لأهداف الأمان يعتمد على التحديد الصحيح للمستخدمين.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What kind of programs must be trusted to verify who is logging in?", options: ["Word processors", "Authentication programs", "Web browsers", "Video games"], ans: 1 },
                    { type: 'mcq', q: "Which of the following is given as an example of an authentication program?", options: ["Excel", "SSH", "Paint", "Calculator"], ans: 1 },
                    { type: 'tf', q: "Software outside the OS never needs to be trusted.", ans: "false" },
                    { type: 'tf', q: "The OS depends on programs to authenticate the identity of users.", ans: "true" },
                    { type: 'short', q: "Name a program used to authenticate identity mentioned in the slide.", ans: "login / SSH" },
                    { type: 'short', q: "What must be correctly identified for security goals to be enforced?", ans: "users" }
                ]
            },
            {
                id: 42,
                titleEn: "Threat Model",
                titleAr: "نموذج التهديد",
                contentEn: `
                    <h2 class="slide-title">THREAT MODEL</h2>
                    <ul class="slide-list">
                        <li>A ${kw('threat model')} defines a set of operations that an attacker may use to compromise a system.</li>
                        <li>In threat model, we assume a powerful attacker who is capable of injecting operations from the network and may be in control of some of the running software on the system (i.e., outside the trusted computing base).</li>
                        <li>We presume that the attacker is actively working to violate the system security goals.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">نموذج التهديد (THREAT MODEL)</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>يحدد ${kw('threat model')} (نموذج التهديد) مجموعة من العمليات التي قد يستخدمها المهاجم لاختراق النظام.</li>
                        <li>في نموذج التهديد، نفترض وجود مهاجم قوي قادر على حقن عمليات من الشبكة وقد يكون مسيطراً على بعض البرامج قيد التشغيل على النظام (أي خارج قاعدة الحوسبة الموثوقة).</li>
                        <li>نحن نفترض أن المهاجم يعمل بنشاط لانتهاك أهداف أمان النظام.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What defines operations an attacker may use to compromise a system?", options: ["Trust model", "Security goals", "Threat model", "Resource allocator"], ans: 2 },
                    { type: 'mcq', q: "Where might a powerful attacker inject operations from?", options: ["Only the keyboard", "The network", "The ROM", "The display"], ans: 1 },
                    { type: 'tf', q: "The threat model typically assumes a very weak attacker.", ans: "false" },
                    { type: 'tf', q: "The attacker is presumed to be actively working to violate security goals.", ans: "true" },
                    { type: 'short', q: "What model assumes the attacker can inject operations from the network?", ans: "Threat model" },
                    { type: 'short', q: "What is the attacker actively working to violate?", ans: "system security goals" }
                ]
            },
            {
                id: 43,
                titleEn: "Commercial OS Weakness",
                titleAr: "ضعف أنظمة التشغيل التجارية",
                contentEn: `
                    <h2 class="slide-title">Cont..</h2>
                    <ul class="slide-list">
                        <li>If an attacker can only access the system via the network, then the attacker may try to send any operation to any processes that provide network access.</li>
                        <li>This threat model exposes a fundamental weakness in commercial operating systems (e.g., UNIX and Windows); they assume that all software running on behalf of a subject is trusted by that subject.</li>
                        <li>For example, a subject may run a word processor and an email client, and in commercial systems these processes are trusted to behave as the user would. However, in this threat model, both of processes may be under the control of an attacker (e.g., via a document macro virus or via a malicious script or email attachment).</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">يتبع..</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>إذا تمكن المهاجم من الوصول إلى النظام فقط عبر الشبكة، فقد يحاول المهاجم إرسال أي عملية إلى أي عمليات توفر الوصول إلى الشبكة.</li>
                        <li>يكشف نموذج التهديد هذا عن ضعف أساسي في أنظمة التشغيل التجارية (مثل UNIX و Windows)؛ فهم يفترضون أن جميع البرامج التي تعمل نيابة عن موضوع (subject) موثوق بها من قبل هذا الموضوع.</li>
                        <li>على سبيل المثال، قد يقوم موضوع بتشغيل معالج نصوص وعميل بريد إلكتروني، وفي الأنظمة التجارية يوثق بهذه العمليات لتتصرف كما يفعل المستخدم. ومع ذلك، في نموذج التهديد هذا، قد تكون كلتا العمليتين تحت سيطرة المهاجم (على سبيل المثال، عبر فيروس ماكرو في مستند أو عبر برنامج نصي ضار أو مرفق بريد إلكتروني).</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What do commercial OS often assume about software running for a subject?", options: ["It is malicious", "It is trusted", "It is broken", "It needs updating"], ans: 1 },
                    { type: 'mcq', q: "Which of the following are examples of commercial operating systems?", options: ["Linux only", "UNIX and Windows", "Android and iOS", "Custom mainframes"], ans: 1 },
                    { type: 'tf', q: "Commercial systems assume user processes might be malicious by default.", ans: "false" },
                    { type: 'tf', q: "A document macro virus can place a word processor under the control of an attacker.", ans: "true" },
                    { type: 'short', q: "Name one commercial OS mentioned.", ans: "UNIX / Windows" },
                    { type: 'short', q: "What is a fundamental weakness of commercial OS?", ans: "assuming software is trusted" }
                ]
            },
            {
                id: 44,
                titleEn: "Protecting the TCB",
                titleAr: "حماية قاعدة الحوسبة الموثوقة",
                contentEn: `
                    <h2 class="slide-title">Cont..</h2>
                    <ul class="slide-list">
                        <li>The task of a secure operating system developer is to protect the TCB from the types of Threats.</li>
                        <li>For example, secure operating system can prevent a user process with access to secret data from leaking that data, by limiting the interactions of that process. However, protecting the TCB is more difficult because it interacts with a variety of untrusted processes.</li>
                        <li>The secure operating system developer must ensure that all the components of the trusted computing base prevent such threats correctly.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">يتبع..</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>تتمثل مهمة مطور نظام التشغيل الآمن في حماية TCB من أنواع التهديدات.</li>
                        <li>على سبيل المثال، يمكن لنظام التشغيل الآمن أن يمنع عملية مستخدم لديها وصول إلى بيانات سرية من تسريب تلك البيانات، وذلك عن طريق الحد من تفاعلات تلك العملية. ومع ذلك، فإن حماية TCB أكثر صعوبة لأنها تتفاعل مع مجموعة متنوعة من العمليات غير الموثوقة.</li>
                        <li>يجب على مطور نظام التشغيل الآمن التأكد من أن جميع مكونات قاعدة الحوسبة الموثوقة تمنع مثل هذه التهديدات بشكل صحيح.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What is the developer's task regarding the TCB?", options: ["Delete it", "Protect it from threats", "Make it open source", "Increase its size"], ans: 1 },
                    { type: 'mcq', q: "Why is protecting the TCB difficult?", options: ["It is too small", "It interacts with untrusted processes", "It has no power", "It doesn't use the network"], ans: 1 },
                    { type: 'tf', q: "The TCB never interacts with untrusted processes.", ans: "false" },
                    { type: 'tf', q: "A secure OS limits interactions of processes to prevent leaking data.", ans: "true" },
                    { type: 'short', q: "What must the developer protect the TCB from?", ans: "Threats" },
                    { type: 'short', q: "What limits the leakage of secret data by a process?", ans: "limiting interactions" }
                ]
            },
            {
                id: 45,
                titleEn: "The End",
                titleAr: "النهاية",
                contentEn: `
                    <div class="flex flex-col items-center justify-center h-full">
                        <img src="https://via.placeholder.com/200x200.png?text=BU+Logo" alt="Al-Baha University Logo" class="mb-8" style="background-color: transparent;">
                        <h1 class="text-6xl font-bold text-blue-900 mt-10">The End</h1>
                    </div>
                `,
                contentAr: `
                    <div class="flex flex-col items-center justify-center h-full">
                        <img src="https://via.placeholder.com/200x200.png?text=BU+Logo" alt="شعار جامعة الباحة" class="mb-8" style="background-color: transparent;">
                        <h1 class="text-6xl font-bold text-blue-900 mt-10 font-cairo">النهاية</h1>
                    </div>
                `,
                quiz: []
            }
        ];

        // --- 2. STATE & LOGIC ---
        let currentSlideIndex = 0;
        let isArabic = false;

        const slideNav = document.getElementById('slide-nav');
        const slideContent = document.getElementById('slide-content');
        const langToggleBtn = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar');
        const quizBtn = document.getElementById('quiz-btn');

        // Initialize App
        function init() {
            buildNavigation();
            renderSlide(0);
        }

        // Build Sidebar Navigation
        function buildNavigation() {
            slideNav.innerHTML = '';
            slides.forEach((slide, index) => {
                const li = document.createElement('li');
                li.className = `px-6 py-3 cursor-pointer border-l-4 transition-colors duration-200 ${index === currentSlideIndex ? 'border-blue-500 bg-gray-700 text-white' : 'border-transparent text-gray-400 hover:bg-gray-800 hover:text-white'}`;
                
                // Add a small divider before part 2 starts
                if (slide.id === 26) {
                    const divider = document.createElement('div');
                    divider.className = "px-6 py-2 bg-gray-900 text-xs font-bold text-gray-500 uppercase tracking-wider";
                    divider.innerText = isArabic ? "الجزء الثاني" : "Part 2";
                    slideNav.appendChild(divider);
                }

                li.innerHTML = `<span class="mr-2 opacity-50">${slide.id.toString().padStart(2, '0')}</span> ${isArabic ? slide.titleAr : slide.titleEn}`;
                li.onclick = () => {
                    currentSlideIndex = index;
                    renderSlide(index);
                    buildNavigation(); // Update active state
                };
                slideNav.appendChild(li);
            });
        }

        // Render specific slide
        function renderSlide(index) {
            const slide = slides[index];
            const content = isArabic ? slide.contentAr : slide.contentEn;
            
            // Footer HTML structure
            const footer = `
                <div class="mt-auto pt-8 border-t border-gray-200 flex justify-between items-center text-sm text-gray-500 ${isArabic ? 'flex-row-reverse' : ''}">
                    <div class="font-bold text-blue-800">BU <br> <span class="font-normal text-xs text-black">${isArabic ? 'جامعة الباحة' : 'Al-Baha University'}</span></div>
                    <div class="bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center font-bold">${slide.id}</div>
                </div>
            `;

            slideContent.innerHTML = content + footer;

            // Handle Quiz Button visibility
            if(slide.quiz && slide.quiz.length > 0) {
                quizBtn.style.display = 'flex';
            } else {
                quizBtn.style.display = 'none';
            }
        }

        // Translation Toggle
        langToggleBtn.onclick = () => {
            isArabic = !isArabic;
            document.documentElement.lang = isArabic ? 'ar' : 'en';
            document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
            langText.innerText = isArabic ? 'English' : 'ترجمة للعربية';
            
            // Update sidebar direction/layout roughly
            if(isArabic) {
                sidebar.classList.remove('border-r');
                sidebar.classList.add('border-l');
            } else {
                sidebar.classList.remove('border-l');
                sidebar.classList.add('border-r');
            }

            buildNavigation();
            renderSlide(currentSlideIndex);
        };

        // Sidebar Toggle
        toggleSidebarBtn.onclick = () => {
            sidebar.classList.toggle('w-0');
            sidebar.classList.toggle('w-1/4');
            sidebar.classList.toggle('px-0');
        };

        // --- 3. MODALS (Keywords & Quiz) ---

        function showKeyword(word) {
            const data = dictionary[word];
            if(!data) return;

            document.getElementById('kw-title').innerText = word;
            document.getElementById('kw-en').innerText = data.en;
            document.getElementById('kw-ar').innerText = data.ar;
            
            document.getElementById('keyword-modal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'quiz-modal') {
                document.getElementById('quiz-results').classList.add('hidden');
                document.getElementById('quiz-results').innerHTML = '';
            }
        }

        quizBtn.onclick = () => {
            const slide = slides[currentSlideIndex];
            if(!slide || !slide.quiz || slide.quiz.length === 0) return;

            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            document.getElementById('quiz-results').classList.add('hidden');

            slide.quiz.forEach((q, i) => {
                let html = `<div class="quiz-question" id="q-block-${i}">
                    <p class="font-bold text-lg mb-2">${i + 1}. ${q.q}</p>`;

                if(q.type === 'mcq') {
                    q.options.forEach((opt, optIndex) => {
                        html += `<label class="block cursor-pointer p-2 hover:bg-blue-50 rounded">
                            <input type="radio" name="q${i}" value="${optIndex}" class="mr-2"> ${opt}
                        </label>`;
                    });
                } else if(q.type === 'tf') {
                    html += `
                        <label class="inline-block cursor-pointer p-2 mr-4 hover:bg-blue-50 rounded"><input type="radio" name="q${i}" value="true" class="mr-1"> True</label>
                        <label class="inline-block cursor-pointer p-2 hover:bg-blue-50 rounded"><input type="radio" name="q${i}" value="false" class="mr-1"> False</label>
                    `;
                } else if(q.type === 'short') {
                    html += `<input type="text" name="q${i}" class="w-full border border-gray-300 p-2 rounded mt-1 focus:outline-none focus:border-blue-500" placeholder="Type your answer...">`;
                }
                
                html += `</div>`;
                container.innerHTML += html;
            });

            document.getElementById('quiz-modal').style.display = 'flex';
        };

        function evaluateQuiz() {
            const slide = slides[currentSlideIndex];
            let score = 0;
            const resultsDiv = document.getElementById('quiz-results');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            slide.quiz.forEach((q, i) => {
                const block = document.getElementById(`q-block-${i}`);
                let isCorrect = false;
                let userAnswer = '';
                let correctAnswerStr = '';

                if(q.type === 'mcq') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.options[q.ans];
                    if(selected) {
                        userAnswer = q.options[parseInt(selected.value)];
                        if(parseInt(selected.value) === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'tf') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.ans.charAt(0).toUpperCase() + q.ans.slice(1);
                    if(selected) {
                        userAnswer = selected.value === "true" ? "True" : "False";
                        if(selected.value === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'short') {
                    const input = document.querySelector(`input[name="q${i}"]`);
                    correctAnswerStr = q.ans;
                    if(input && input.value.trim() !== '') {
                        userAnswer = input.value.trim();
                        // Simple validation for short answer
                        if(userAnswer.length > 2) {
                             isCorrect = true; 
                        }
                    }
                }

                if(isCorrect) score++;

                const feedback = document.createElement('div');
                feedback.className = 'mt-2 p-3 rounded ' + (isCorrect ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300');
                feedback.innerHTML = `
                    <p class="${isCorrect ? 'correct-answer' : 'wrong-answer'}">
                        <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'} mr-1"></i>
                        Q${i+1}: ${isCorrect ? 'Correct!' : 'Incorrect.'}
                    </p>
                    ${!isCorrect ? `<p class="text-sm mt-1 text-gray-700"><b>Correct Answer:</b> ${correctAnswerStr}</p>` : ''}
                `;
                block.appendChild(feedback);
            });

            resultsDiv.innerHTML = `<div class="bg-indigo-100 border-l-4 border-indigo-500 p-4 rounded text-center">
                <p class="text-2xl font-bold text-indigo-800">Your Score: ${score} / 6</p>
            </div>`;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const kwModal = document.getElementById('keyword-modal');
            const qzModal = document.getElementById('quiz-modal');
            if (event.target == kwModal) {
                closeModal('keyword-modal');
            }
            if (event.target == qzModal) {
                closeModal('quiz-modal');
            }
        }

        // Start
        window.onload = init;

    </script>
</body>
</html>
