<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication and Authorization - Al-Baha University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f4f6;
            overflow-x: hidden;
        }

        :lang(ar) {
            font-family: 'Cairo', sans-serif;
        }

        .slide-container {
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #1a56db;
            border-bottom: 8px solid #10b981;
            min-height: 500px;
            position: relative;
        }

        .keyword {
            background-color: #fef08a;
            color: #b45309;
            padding: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 2px dashed #b45309;
        }

        .keyword:hover {
            background-color: #fde047;
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .close-btn:hover { color: #111827; }

        .quiz-question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .correct-answer { color: #16a34a; font-weight: bold; }
        .wrong-answer { color: #dc2626; font-weight: bold; }

        .slide-title { color: #1e3a8a; font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem;}
        .slide-list { list-style-type: none; padding-left: 1.5rem; }
        .slide-list > li { margin-bottom: 1rem; font-size: 1.25rem; position: relative;}
        .slide-list > li::before { content: '■'; color: #3b82f6; position: absolute; left: -1.5rem; top: 0.2rem; font-size: 0.8rem;}
        .slide-sublist { list-style-type: circle; padding-left: 2rem; margin-top: 0.5rem;}
        .slide-sublist > li { font-size: 1.1rem; margin-bottom: 0.5rem; color: #4b5563;}

    </style>
</head>
<body class="flex h-screen text-gray-800">

    <!-- Sidebar -->
    <aside class="w-1/4 bg-gray-900 text-white flex flex-col h-full overflow-hidden shadow-xl z-10 transition-all duration-300" id="sidebar">
        <div class="p-6 border-b border-gray-700 bg-gray-800">
            <h1 class="text-xl font-bold text-blue-400 mb-2">Operating System Security</h1>
            <p class="text-sm text-gray-400">Chapter 03: Authentication and Authorization</p>
        </div>
        <div class="flex-1 overflow-y-auto" id="slide-list-container">
            <ul id="slide-nav" class="py-2">
                <!-- Navigation items injected via JS -->
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative bg-gray-100 overflow-y-auto transition-all duration-300" id="main-content">
        <!-- Top Toolbar -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <button id="toggle-sidebar" class="text-gray-500 hover:text-blue-600 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex gap-4">
                <button id="lang-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition">
                    <i class="fas fa-language"></i> <span id="lang-text">ترجمة للعربية</span>
                </button>
                <button id="quiz-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition">
                    <i class="fas fa-question-circle"></i> <span>Take Quiz</span>
                </button>
            </div>
        </header>

        <!-- Slide Area -->
        <div class="flex-1 p-8 flex justify-center items-start overflow-y-auto">
            <div class="slide-container w-full max-w-4xl p-10 flex flex-col" id="slide-content">
                <!-- Slide content injected here -->
            </div>
        </div>
    </main>

    <!-- Keyword Modal -->
    <div id="keyword-modal" class="modal-overlay">
        <div class="modal-content text-center">
            <i class="fas fa-times close-btn text-2xl" onclick="closeModal('keyword-modal')"></i>
            <h2 id="kw-title" class="text-2xl font-bold text-blue-800 mb-4 pb-2 border-b"></h2>
            <div class="bg-blue-50 p-4 rounded-lg mb-4 text-left">
                <p class="text-sm font-bold text-blue-600 uppercase mb-1">English Definition:</p>
                <p id="kw-en" class="text-lg"></p>
            </div>
            <div class="bg-green-50 p-4 rounded-lg text-right" dir="rtl">
                <p class="text-sm font-bold text-green-600 mb-1">الشرح بالعربية:</p>
                <p id="kw-ar" class="text-lg font-cairo"></p>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quiz-modal" class="modal-overlay">
        <div class="modal-content w-full max-w-3xl">
            <i class="fas fa-times close-btn text-2xl" onclick="closeModal('quiz-modal')"></i>
            <h2 class="text-2xl font-bold text-indigo-800 mb-6 border-b pb-2"><i class="fas fa-pencil-alt mr-2"></i> Slide Quiz</h2>
            <div id="quiz-container" class="space-y-6">
                <!-- Quiz forms injected here -->
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="evaluateQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow transition">Submit Answers</button>
            </div>
            <div id="quiz-results" class="mt-6 hidden"></div>
        </div>
    </div>

    <script>
        const dictionary = {
            "Authentication": { en: "The process of identifying the subject or verifying the identity of a user.", ar: "عملية تحديد هوية الموضوع أو التحقق من هوية المستخدم." },
            "Authorization": { en: "Defines a relation among subjects, actions, and objects; determines what an identified user is allowed to do.", ar: "يحدد العلاقة بين المواضيع والإجراءات والكائنات؛ لتحديد ما يُسمح للمستخدم المحدد بفعله." },
            "Auditing": { en: "The act of monitoring or recording the actions of subjects on objects (also referred to as Accounting).", ar: "عملية مراقبة أو تسجيل إجراءات المواضيع على الكائنات (يشار إليها أيضًا بالمحاسبة)." },
            "Accounting": { en: "The act of monitoring or auditing the actions of subjects on objects.", ar: "عملية مراقبة أو تدقيق إجراءات المواضيع على الكائنات." },
            "Token": { en: "A physical or digital object used for authentication (What do you have?).", ar: "كائن مادي أو رقمي يستخدم للمصادقة (ماذا تملك؟)." },
            "Biometrics": { en: "Authentication based on a part of the human body.", ar: "المصادقة بناءً على جزء من جسم الإنسان." },
            "Access Control": { en: "Restricting access based on consumers and resources.", ar: "تقييد الوصول بناءً على المستهلكين والموارد." },
            "Security policy": { en: "A statement that partitions the states of the system into authorized and unauthorized states.", ar: "بيان يقسم حالات النظام إلى حالات مصرح بها (آمنة) وحالات غير مصرح بها (غير آمنة)." },
            "MAC": { en: "Mandatory Access Control: An access control model.", ar: "التحكم الإلزامي في الوصول: نموذج للتحكم في الوصول." },
            "DAC": { en: "Discretionary Access Control: An access control model.", ar: "التحكم التقديري في الوصول: نموذج للتحكم في الوصول." },
            "RBAC": { en: "Role-Based Access Control: An access control model based on user roles.", ar: "التحكم في الوصول القائم على الدور: نموذج يعتمد على أدوار المستخدم." },
            "SSO": { en: "Single Sign On: Allows user credentials to be entered one time to access all resources.", ar: "تسجيل الدخول الموحد: يسمح بإدخال بيانات اعتماد المستخدم مرة واحدة للوصول إلى جميع الموارد." },
            "Kerberos": { en: "An SSO open-standards protocol that uses symmetric key encryption.", ar: "بروتوكول SSO مفتوح المعايير يستخدم تشفير المفتاح المتماثل." },
            "SESAME": { en: "Secure European System for Applications in a Multi-Vendor Environment: A protocol addressing multiple security domains.", ar: "بروتوكول أوروبي للتطبيقات في بيئة متعددة الموردين يعالج مجالات أمان متعددة." }
        };

        function kw(word, key) {
            return `<span class="keyword" onclick="showKeyword('${key || word}')">${word}</span>`;
        }

        const slides = [
            {
                id: 2,
                titleEn: "Outlines",
                titleAr: "المحتويات",
                contentEn: `
                    <h2 class="slide-title">Outlines:</h2>
                    <ul class="slide-list">
                        <li>Introduction.</li>
                        <li>${kw('Authentication', 'Authentication')}</li>
                        <li>${kw('Authorization', 'Authorization')}</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">المحتويات:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>مقدمة.</li>
                        <li>${kw('المصادقة (Authentication)', 'Authentication')}</li>
                        <li>${kw('التفويض (Authorization)', 'Authorization')}</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which of the following is listed in the outlines?", options: ["Encryption", "Authentication", "Firewalls", "Routing"], ans: 1 },
                    { type: 'mcq', q: "What is the final topic in the outline?", options: ["Introduction", "Accounting", "Authorization", "Logging"], ans: 2 },
                    { type: 'tf', q: "Authentication is part of the outline.", ans: "true" },
                    { type: 'tf', q: "Network topology is included in this outline.", ans: "false" },
                    { type: 'short', q: "Name the first topic in the outline.", ans: "Introduction" },
                    { type: 'short', q: "What topic comes after Authentication?", ans: "Authorization" }
                ]
            },
            {
                id: 3,
                titleEn: "Introduction",
                titleAr: "مقدمة",
                contentEn: `
                    <h2 class="slide-title">Introduction:</h2>
                    <ul class="slide-list">
                        <li>In order to construct a secure system, we must ensure that only authorized persons can perform certain functions. In particular we need to secure our system by controlling the subjects, objects and actions allowed on our system.</li>
                        <li class="mt-4">Achieving this goal requires a good combination of ${kw('Authentication', 'Authentication')}, ${kw('Authorization', 'Authorization')}, and ${kw('Auditing', 'Auditing')}.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">مقدمة:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>من أجل بناء نظام آمن، يجب أن نضمن أن الأشخاص المصرح لهم فقط هم من يمكنهم أداء وظائف معينة. على وجه الخصوص، نحتاج إلى تأمين نظامنا من خلال التحكم في المواضيع (subjects) والكائنات (objects) والإجراءات (actions) المسموح بها في نظامنا.</li>
                        <li class="mt-4">يتطلب تحقيق هذا الهدف مزيجًا جيدًا من ${kw('المصادقة (Authentication)', 'Authentication')}، و${kw('التفويض (Authorization)', 'Authorization')}، و${kw('التدقيق (Auditing)', 'Auditing')}.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "To construct a secure system, who can perform certain functions?", options: ["Anyone", "Only authorized persons", "Only guests", "Only computers"], ans: 1 },
                    { type: 'mcq', q: "Achieving the security goal requires a good combination of Authentication, Authorization, and what?", options: ["Encryption", "Routing", "Auditing", "Updating"], ans: 2 },
                    { type: 'tf', q: "We need to secure our system by controlling subjects, objects, and actions.", ans: "true" },
                    { type: 'tf', q: "Auditing is not required to achieve the security goal.", ans: "false" },
                    { type: 'short', q: "What must we ensure to construct a secure system?", ans: "only authorized persons can perform certain functions" },
                    { type: 'short', q: "Name the three components whose combination is required to achieve the goal.", ans: "Authentication, Authorization, and Auditing" }
                ]
            },
            {
                id: 4,
                titleEn: "Authentication, Authorization & Accounting",
                titleAr: "المصادقة والتفويض والمحاسبة",
                contentEn: `
                    <h2 class="slide-title">Introduction:</h2>
                    <ul class="slide-list">
                        <li>${kw('Authentication', 'Authentication')} is the process of identifying the subject.</li>
                        <li>${kw('Authorization', 'Authorization')} defines a relation among subjects, actions, and objects.</li>
                        <li>${kw('Accounting', 'Accounting')} is the act of monitoring or auditing the actions of subjects on objects.</li>
                        <li class="mt-4 border-l-4 border-blue-500 pl-4 bg-gray-50 py-2 text-blue-900 font-semibold">Together these three components allow us to control and trace every activity that occurs in our system.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">مقدمة:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>${kw('المصادقة', 'Authentication')} هي عملية تحديد الموضوع (subject).</li>
                        <li>${kw('التفويض', 'Authorization')} يحدد العلاقة بين المواضيع والإجراءات والكائنات.</li>
                        <li>${kw('المحاسبة (Accounting)', 'Accounting')} هي عملية مراقبة أو تدقيق إجراءات المواضيع على الكائنات.</li>
                        <li class="mt-4 border-r-4 border-blue-500 pr-4 bg-gray-50 py-2 text-blue-900 font-semibold">تسمح لنا هذه المكونات الثلاثة معًا بالتحكم في كل نشاط يحدث في نظامنا وتتبعه.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What is the process of identifying the subject?", options: ["Accounting", "Authentication", "Authorization", "Routing"], ans: 1 },
                    { type: 'mcq', q: "What defines a relation among subjects, actions, and objects?", options: ["Authentication", "Auditing", "Authorization", "Tracing"], ans: 2 },
                    { type: 'tf', q: "Accounting is the act of monitoring or auditing actions.", ans: "true" },
                    { type: 'tf', q: "Authentication allows us to trace every activity alone.", ans: "false" },
                    { type: 'short', q: "What is the act of monitoring or auditing the actions of subjects on objects called?", ans: "Accounting" },
                    { type: 'short', q: "What do the three components together allow us to control and trace?", ans: "every activity that occurs in our system" }
                ]
            },
            {
                id: 5,
                titleEn: "Who can do what when?",
                titleAr: "من يمكنه فعل ماذا ومتى؟",
                contentEn: `
                    <h2 class="slide-title">Introduction:</h2>
                    <ul class="slide-list">
                        <li>This view of security can be summed up as <strong>"Who can do what when?"</strong>.</li>
                        <li class="mt-4">
                            <ul class="slide-sublist">
                                <li><strong>Authentication</strong> allows us to identify "Who".</li>
                                <li><strong>Authorization</strong> controls the action ("do what when").</li>
                                <li><strong>Auditing</strong> records all the action.</li>
                            </ul>
                        </li>
                        <li class="mt-4 text-red-600 font-bold">All three components are necessary. Missing one component is likely to result in an insecure system.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">مقدمة:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>يمكن تلخيص هذه النظرة للأمان في عبارة <strong>"من يمكنه فعل ماذا ومتى؟"</strong>.</li>
                        <li class="mt-4">
                            <ul class="slide-sublist">
                                <li><strong>المصادقة (Authentication)</strong> تسمح لنا بتحديد "من (Who)".</li>
                                <li><strong>التفويض (Authorization)</strong> يتحكم في الإجراء ("فعل ماذا ومتى / do what when").</li>
                                <li><strong>التدقيق (Auditing)</strong> يسجل كل الإجراءات.</li>
                            </ul>
                        </li>
                        <li class="mt-4 text-red-600 font-bold">جميع المكونات الثلاثة ضرورية. من المرجح أن يؤدي فقدان أحد المكونات إلى نظام غير آمن.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which component allows us to identify 'Who'?", options: ["Authorization", "Authentication", "Auditing", "Accounting"], ans: 1 },
                    { type: 'mcq', q: "What records all the action?", options: ["Auditing", "Authentication", "Authorization", "Policies"], ans: 0 },
                    { type: 'tf', q: "Missing one component is likely to result in an insecure system.", ans: "true" },
                    { type: 'tf', q: "Authorization identifies 'Who'.", ans: "false" },
                    { type: 'short', q: "What question sums up this view of security?", ans: "Who can do what when?" },
                    { type: 'short', q: "What controls the action ('do what when')?", ans: "Authorization" }
                ]
            },
            {
                id: 6,
                titleEn: "Example: A Safe",
                titleAr: "مثال: خزنة",
                contentEn: `
                    <h2 class="slide-title">Introduction</h2>
                    <p class="font-bold text-xl text-blue-800 mb-4">Example 1: A safe.</p>
                    <ul class="slide-list">
                        <li>The <strong>policy</strong> of the safe is that the person with the key is allowed to access the safe.</li>
                        <li>The <strong>authentication</strong> is the validation of the key. In this case, the mechanism for validating the key is the lock.</li>
                        <li><strong>Accounting</strong> could be a log of people who inserted a key into the lock.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">مقدمة</h2>
                    <p class="font-bold text-xl text-blue-800 mb-4" dir="rtl">مثال 1: خزنة (A safe).</p>
                    <ul class="slide-list" dir="rtl">
                        <li><strong>السياسة (policy)</strong> الخاصة بالخزنة هي أنه يُسمح للشخص الذي يحمل المفتاح بالوصول إلى الخزنة.</li>
                        <li><strong>المصادقة (authentication)</strong> هي التحقق من صحة المفتاح. في هذه الحالة، آلية التحقق من المفتاح هي القفل (lock).</li>
                        <li><strong>المحاسبة (Accounting)</strong> يمكن أن تكون سجلاً للأشخاص الذين أدخلوا مفتاحًا في القفل.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "In the safe example, what is the mechanism for validating the key?", options: ["The policy", "The log", "The lock", "The person"], ans: 2 },
                    { type: 'mcq', q: "In the safe example, what represents accounting?", options: ["The safe door", "A log of people who inserted a key", "The key itself", "The lock"], ans: 1 },
                    { type: 'tf', q: "The policy of the safe allows anyone to access it.", ans: "false" },
                    { type: 'tf', q: "Authentication is the validation of the key.", ans: "true" },
                    { type: 'short', q: "What is the policy of the safe?", ans: "person with the key is allowed to access" },
                    { type: 'short', q: "What acts as the authentication mechanism in this example?", ans: "the lock" }
                ]
            },
            {
                id: 7,
                titleEn: "Authentication Definition",
                titleAr: "تعريف المصادقة",
                contentEn: `
                    <h2 class="slide-title">Authentication</h2>
                    <ul class="slide-list">
                        <li>In a <strong>computer system</strong>, authentication is the process of verifying identity of a user.</li>
                        <li class="mt-6">In a <strong>communication system</strong>, authentication is the process of verifying the stated source of a message.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">المصادقة</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>في <strong>نظام الكمبيوتر</strong>، المصادقة هي عملية التحقق من هوية المستخدم.</li>
                        <li class="mt-6">في <strong>نظام الاتصالات</strong>، المصادقة هي عملية التحقق من المصدر المذكور للرسالة.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "In a computer system, authentication is the process of verifying what?", options: ["File size", "Identity of a user", "Network speed", "Disk space"], ans: 1 },
                    { type: 'mcq', q: "In a communication system, authentication verifies what?", options: ["Stated source of a message", "The time of day", "The encryption algorithm", "The router MAC address"], ans: 0 },
                    { type: 'tf', q: "Authentication means the same exact thing in all contexts without variation.", ans: "false" },
                    { type: 'tf', q: "Verifying the stated source of a message is authentication in communication systems.", ans: "true" },
                    { type: 'short', q: "What is verified in a computer system?", ans: "identity of a user" },
                    { type: 'short', q: "What is verified in a communication system?", ans: "stated source of a message" }
                ]
            },
            {
                id: 8,
                titleEn: "Authentication Similarities",
                titleAr: "أوجه التشابه في المصادقة",
                contentEn: `
                    <h2 class="slide-title">Authentication</h2>
                    <ul class="slide-list">
                        <li>Although the definitions of authentication may vary in different contexts, they all share the similarity of validating the quality or condition of being trustworthy, genuine, or credible.</li>
                        <li class="mt-4">Example: Authenticating a transcript can be done by validating the university seal on the document itself.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">المصادقة</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>على الرغم من أن تعريفات المصادقة قد تختلف في سياقات مختلفة، إلا أنها تشترك جميعها في تشابه التحقق من صحة الجودة أو شرط كونها جديرة بالثقة أو أصلية أو ذات مصداقية.</li>
                        <li class="mt-4">مثال: يمكن مصادقة كشف الدرجات (transcript) عن طريق التحقق من ختم الجامعة على المستند نفسه.</li>
                    </ul>
                `,

                    <ul class="slide-list">
                        <li>An SSO open-standards protocol for authentication in a single security domain.</li>
                        <li class="mt-4">Kerberos is an authentication protocol that uses symmetric key encryption in three key pairs: two authentication pairs are shared by the authenticator and a single principal, and one session pair is shared between principals.</li>
                        <li class="mt-4">The session-key pair is distributed in such a way that principals are required to trust the authenticator rather than each other.</li>
                    </ul>
                `,

                contentAr: `
                    <div class="flex flex-col items-center justify-center h-full">
                        <img src="https://via.placeholder.com/200x200.png?text=BU+Logo" alt="شعار جامعة الباحة" class="mb-8" style="background-color: transparent;">

                    </div>

        // --- 2. STATE & LOGIC ---
        let currentSlideIndex = 0;
        let isArabic = false;

        const slideNav = document.getElementById('slide-nav');
        const slideContent = document.getElementById('slide-content');
        const langToggleBtn = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar');
        const quizBtn = document.getElementById('quiz-btn');

        function init() {
            buildNavigation();
            renderSlide(0);
        }

        function buildNavigation() {
            slideNav.innerHTML = '';
            slides.forEach((slide, index) => {
                const li = document.createElement('li');
                li.className = `px-6 py-3 cursor-pointer border-l-4 transition-colors duration-200 ${index === currentSlideIndex ? 'border-blue-500 bg-gray-700 text-white' : 'border-transparent text-gray-400 hover:bg-gray-800 hover:text-white'}`;
                li.innerHTML = `<span class="mr-2 opacity-50">${slide.id.toString().padStart(2, '0')}</span> ${isArabic ? slide.titleAr : slide.titleEn}`;
                li.onclick = () => {
                    currentSlideIndex = index;
                    renderSlide(index);
                    buildNavigation();
                };
                slideNav.appendChild(li);
            });
        }

        function renderSlide(index) {
            const slide = slides[index];
            const content = isArabic ? slide.contentAr : slide.contentEn;
            
            const footer = `
                <div class="mt-auto pt-8 border-t border-gray-200 flex justify-between items-center text-sm text-gray-500 ${isArabic ? 'flex-row-reverse' : ''}">
                    <div class="font-bold text-blue-800">BU <br> <span class="font-normal text-xs text-black">${isArabic ? 'جامعة الباحة' : 'Al-Baha University'}</span></div>
                    <div class="bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center font-bold">${slide.id}</div>
                </div>
            `;

            slideContent.innerHTML = content + footer;

            if(slide.quiz && slide.quiz.length > 0) {
                quizBtn.style.display = 'flex';
            } else {
                quizBtn.style.display = 'none';
            }
        }

        langToggleBtn.onclick = () => {
            isArabic = !isArabic;
            document.documentElement.lang = isArabic ? 'ar' : 'en';
            document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
            langText.innerText = isArabic ? 'English' : 'ترجمة للعربية';
            
            if(isArabic) {
                sidebar.classList.remove('border-r');
                sidebar.classList.add('border-l');
            } else {
                sidebar.classList.remove('border-l');
                sidebar.classList.add('border-r');
            }

            buildNavigation();
            renderSlide(currentSlideIndex);
        };

        toggleSidebarBtn.onclick = () => {
            sidebar.classList.toggle('w-0');
            sidebar.classList.toggle('w-1/4');
            sidebar.classList.toggle('px-0');
        };

        function showKeyword(wordKey) {
            const data = dictionary[wordKey];
            if(!data) return;

            document.getElementById('kw-title').innerText = wordKey;
            document.getElementById('kw-en').innerText = data.en;
            document.getElementById('kw-ar').innerText = data.ar;
            
            document.getElementById('keyword-modal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'quiz-modal') {
                document.getElementById('quiz-results').classList.add('hidden');
                document.getElementById('quiz-results').innerHTML = '';
            }
        }

        quizBtn.onclick = () => {
            const slide = slides[currentSlideIndex];
            if(!slide || !slide.quiz || slide.quiz.length === 0) return;

            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            document.getElementById('quiz-results').classList.add('hidden');

            slide.quiz.forEach((q, i) => {
                let html = `<div class="quiz-question" id="q-block-${i}">
                    <p class="font-bold text-lg mb-2" dir="ltr">${i + 1}. ${q.q}</p>`;

                if(q.type === 'mcq') {
                    q.options.forEach((opt, optIndex) => {
                        html += `<label class="block cursor-pointer p-2 hover:bg-blue-50 rounded" dir="ltr">
                            <input type="radio" name="q${i}" value="${optIndex}" class="mr-2"> ${opt}
                        </label>`;
                    });
                } else if(q.type === 'tf') {
                    html += `
                        <label class="inline-block cursor-pointer p-2 mr-4 hover:bg-blue-50 rounded" dir="ltr"><input type="radio" name="q${i}" value="true" class="mr-1"> True</label>
                        <label class="inline-block cursor-pointer p-2 hover:bg-blue-50 rounded" dir="ltr"><input type="radio" name="q${i}" value="false" class="mr-1"> False</label>
                    `;
                } else if(q.type === 'short') {
                    html += `<input type="text" name="q${i}" class="w-full border border-gray-300 p-2 rounded mt-1 focus:outline-none focus:border-blue-500" placeholder="Type your answer..." dir="ltr">`;
                }
                
                html += `</div>`;
                container.innerHTML += html;
            });

            document.getElementById('quiz-modal').style.display = 'flex';
        };

        function evaluateQuiz() {
            const slide = slides[currentSlideIndex];
            let score = 0;
            const resultsDiv = document.getElementById('quiz-results');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            slide.quiz.forEach((q, i) => {
                const block = document.getElementById(`q-block-${i}`);
                let isCorrect = false;
                let userAnswer = '';
                let correctAnswerStr = '';

                if(q.type === 'mcq') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.options[q.ans];
                    if(selected) {
                        userAnswer = q.options[parseInt(selected.value)];
                        if(parseInt(selected.value) === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'tf') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.ans.charAt(0).toUpperCase() + q.ans.slice(1);
                    if(selected) {
                        userAnswer = selected.value === "true" ? "True" : "False";
                        if(selected.value === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'short') {
                    const input = document.querySelector(`input[name="q${i}"]`);
                    correctAnswerStr = q.ans;
                    if(input && input.value.trim() !== '') {
                        userAnswer = input.value.trim();
                        if(userAnswer.length > 2) {
                             isCorrect = true; 
                        }
                    }
                }

                if(isCorrect) score++;

                const feedback = document.createElement('div');
                feedback.className = 'mt-2 p-3 rounded ' + (isCorrect ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300');
                feedback.innerHTML = `
                    <p class="${isCorrect ? 'correct-answer' : 'wrong-answer'}">
                        <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'} mr-1"></i>
                        Q${i+1}: ${isCorrect ? 'Correct!' : 'Incorrect.'}
                    </p>
                    ${!isCorrect ? `<p class="text-sm mt-1 text-gray-700"><b>Correct Answer:</b> ${correctAnswerStr}</p>` : ''}
                `;
                block.appendChild(feedback);
            });

            resultsDiv.innerHTML = `<div class="bg-indigo-100 border-l-4 border-indigo-500 p-4 rounded text-center">
                <p class="text-2xl font-bold text-indigo-800">Your Score: ${score} / 6</p>
            </div>`;
        }

        window.onclick = function(event) {
            const kwModal = document.getElementById('keyword-modal');
            const qzModal = document.getElementById('quiz-modal');
            if (event.target == kwModal) {
                closeModal('keyword-modal');
            }
            if (event.target == qzModal) {
                closeModal('quiz-modal');
            }
        }

        window.onload = init;
    </script>
