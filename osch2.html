            display: none;
            position: fixed;

            z-index: 1000;
            justify-content: center;
            align-items: center;

            background: white;
            padding: 2rem;

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .close-btn:hover { color: #111827; }

        .diagram-box {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
            text-align: center;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            font-weight: bold;
        }

        .quiz-question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;

        }

        .correct-answer { color: #16a34a; font-weight: bold; }

        /* Slide specific typography */
        .slide-title { color: #1e3a8a; font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem;}
        .slide-list { list-style-type: none; padding-left: 1.5rem; }
        .slide-list > li { margin-bottom: 1rem; font-size: 1.25rem; position: relative;}
        .slide-list > li::before { content: '■'; color: #3b82f6; position: absolute; left: -1.5rem; top: 0.2rem; font-size: 0.8rem;}
        .slide-sublist { list-style-type: circle; padding-left: 2rem; margin-top: 0.5rem;}
        .slide-sublist > li { font-size: 1.1rem; margin-bottom: 0.5rem; color: #4b5563;}

        .circle-diagram {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: absolute;
            background-color: rgba(147, 197, 253, 0.8); /* blue-300 with opacity */
        }
        .circle-diagram.gray {
            background-color: rgba(209, 213, 219, 0.8); /* gray-300 with opacity */
        }
    </style>
</head>

    <script>
        // --- 1. DATA STRUCTURE (Translations & Keywords) ---
        const dictionary = {
            "OS hardening": { en: "The process of implementing security measures and patching for operating systems to strengthen them against cyberattacks.", ar: "عملية تنفيذ تدابير الأمان وتصحيح أنظمة التشغيل لتقويتها ضد الهجمات الإلكترونية." },
            "attack surface": { en: "The total sum of vulnerabilities that can be exploited in a system.", ar: "المجموع الكلي لنقاط الضعف التي يمكن استغلالها في النظام." },
            "malware": { en: "Malicious software designed to disrupt, damage, or gain unauthorized access to a computer system.", ar: "برامج ضارة مصممة لتعطيل أو إتلاف أو الوصول غير المصرح به إلى نظام الكمبيوتر." },
            "vulnerabilities": { en: "Weaknesses or flaws in a software system that can be exploited by an attacker.", ar: "نقاط الضعف أو العيوب في نظام برمجي والتي يمكن للمهاجم استغلالها." },
            "Firewalls": { en: "Network security systems that monitor and control incoming and outgoing network traffic based on predetermined security rules.", ar: "أنظمة أمان الشبكة التي تراقب وتتحكم في حركة مرور الشبكة الواردة والصادرة بناءً على قواعد أمان محددة مسبقًا." },
            "IDS": { en: "Intrusion Detection System: A device or software application that monitors a network or systems for malicious activity or policy violations.", ar: "نظام كشف التسلل: جهاز أو تطبيق برمجي يراقب شبكة أو أنظمة بحثًا عن نشاط ضار أو انتهاكات للسياسة." },
            "IPS": { en: "Intrusion Prevention System: A network security/threat prevention technology that examines network traffic flows to detect and prevent vulnerability exploits.", ar: "نظام منع التسلل: تقنية أمان الشبكة / منع التهديدات التي تفحص تدفقات حركة مرور الشبكة لاكتشاف ومنع استغلال نقاط الضعف." },
            "patching": { en: "Applying updates to software to correct bugs, vulnerabilities, or improve functionality.", ar: "تطبيق تحديثات على البرامج لتصحيح الأخطاء أو نقاط الضعف أو تحسين الوظائف." },
            "BIOS": { en: "Basic Input/Output System: Firmware used to perform hardware initialization during the booting process.", ar: "نظام الإدخال والإخراج الأساسي: البرامج الثابتة المستخدمة لإجراء تهيئة الأجهزة أثناء عملية التمهيد." },
            "cryptographic file system": { en: "A file system that transparently encrypts data stored on it, securing it against unauthorized physical access.", ar: "نظام ملفات يقوم بتشفير البيانات المخزنة عليه بشفافية، لتأمينها ضد الوصول المادي غير المصرح به." },
            "elevated privileges": { en: "Higher levels of access granted to specific users, allowing them to perform administrative tasks.", ar: "مستويات أعلى من الوصول تُمنح لمستخدمين محددين، مما يتيح لهم أداء مهام إدارية." },
            "white-list": { en: "A security practice that allows only pre-approved programs to run on a system.", ar: "ممارسة أمنية تسمح فقط للبرامج المعتمدة مسبقًا بالعمل على النظام." },
            "Encryption": { en: "The process of encoding a message or information in such a way that only authorized parties can access it.", ar: "عملية تشفير رسالة أو معلومات بطريقة لا يمكن إلا للأطراف المصرح لها الوصول إليها." },
            "Logging": { en: "The systematic recording of events that occur within an organization's systems and networks.", ar: "التسجيل المنهجي للأحداث التي تقع داخل أنظمة وشبكات المؤسسة." },
            "Backup": { en: "The process of making copies of data to allow the recovery of lost or corrupted data over short time periods.", ar: "عملية عمل نسخ من البيانات للسماح باستعادة البيانات المفقودة أو التالفة خلال فترات زمنية قصيرة." },
            "Archive": { en: "The process of retaining copies of data over extended periods of time for legal and operational requirements.", ar: "عملية الاحتفاظ بنسخ من البيانات لفترات زمنية طويلة للمتطلبات القانونية والتشغيلية." }
        };

        function kw(word, key) {
            return `<span class="keyword" onclick="showKeyword('${key || word}')">${word}</span>`;
        }

        // Slides array (starting from slide 2 as per instructions)
        const slides = [
            {
                id: 2,
                titleEn: "Outlines",
                titleAr: "المحتويات",
                contentEn: `
                    <h2 class="slide-title">Outlines:</h2>
                    <ul class="slide-list">
                        <li>${kw('Operating System Hardening', 'OS hardening')}</li>
                        <li>System Security Planning</li>
                        <li>Operating System Security</li>
                        <li>Installing and ${kw('Patching', 'patching')}</li>
                        <li>Operating System Configuration
                            <ul class="slide-sublist">
                                <li>Removing unnecessary services, applications, and protocols</li>
                                <li>Configuring users, groups, and permissions</li>
                                <li>Configuring resource controls</li>
                            </ul>
                        </li>
                        <li>Install Additional Security Controls</li>
                        <li>Test the System Security</li>
                        <li>Securing Critical Contents</li>
                        <li>Application Configuration</li>
                        <li>${kw('Encryption', 'Encryption')} Technology</li>
                        <li>Security Maintenance</li>
                        <li>${kw('Logging', 'Logging')}</li>
                        <li>Data ${kw('Backup', 'Backup')} and ${kw('Archive', 'Archive')}</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">المحتويات:</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>${kw('تقوية نظام التشغيل', 'OS hardening')}</li>
                        <li>تخطيط أمن النظام</li>
                        <li>أمان نظام التشغيل</li>
                        <li>التثبيت و ${kw('التصحيح', 'patching')}</li>
                        <li>تكوين نظام التشغيل
                            <ul class="slide-sublist">
                                <li>إزالة الخدمات والتطبيقات والبروتوكولات غير الضرورية</li>
                                <li>تكوين المستخدمين والمجموعات والأذونات</li>
                                <li>تكوين ضوابط الموارد</li>
                            </ul>
                        </li>
                        <li>تثبيت ضوابط أمان إضافية</li>
                        <li>اختبار أمان النظام</li>
                        <li>تأمين المحتويات الحرجة</li>
                        <li>تكوين التطبيق</li>
                        <li>تقنية ${kw('التشفير', 'Encryption')}</li>
                        <li>صيانة الأمان</li>
                        <li>${kw('التسجيل', 'Logging')}</li>
                        <li>النسخ ${kw('الاحتياطي', 'Backup')} والأرشفة (${kw('Archive', 'Archive')}) للبيانات</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "Which of the following is part of Operating System Configuration according to the outline?", options: ["Data Backup", "Encryption Technology", "Configuring users, groups, and permissions", "Logging"], ans: 2 },
                    { type: 'mcq', q: "What is listed immediately after 'Test the System Security'?", options: ["Application Configuration", "Securing Critical Contents", "Security Maintenance", "Installing and Patching"], ans: 1 },
                    { type: 'tf', q: "System Security Planning is listed in the outlines.", ans: "true" },
                    { type: 'tf', q: "Network routing algorithms are discussed in this chapter.", ans: "false" },
                    { type: 'short', q: "What kind of controls are configured under Operating System Configuration?", ans: "resource controls" },
                    { type: 'short', q: "Name one topic related to data mentioned at the end of the outline.", ans: "Data Backup and Archive / Logging" }
                ]
            },
            {
                id: 3,
                titleEn: "Operating System Hardening",
                titleAr: "تقوية نظام التشغيل",
                contentEn: `
                    <h2 class="slide-title">Operating System Hardening</h2>
                    <ul class="slide-list">
                        <li>${kw('Operating system (OS) hardening', 'OS hardening')} is the process of implementing security measures and patching for operating systems, such as Windows, Linux, or Apple OS X, to strengthen them against cyberattacks.</li>
                        <li class="mt-4">The goal is to protect sensitive computing systems, reducing the system's ${kw('attack surface', 'attack surface')}, in order to lower the risk of data breaches, unauthorized access, systems hacking, or ${kw('malware', 'malware')}.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">تقوية نظام التشغيل</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>${kw('تقوية نظام التشغيل (OS hardening)', 'OS hardening')} هي عملية تنفيذ تدابير الأمان وتصحيح أنظمة التشغيل، مثل Windows أو Linux أو Apple OS X، لتقويتها ضد الهجمات الإلكترونية.</li>
                        <li class="mt-4">الهدف هو حماية أنظمة الحوسبة الحساسة، وتقليل ${kw('سطح الهجوم (attack surface)', 'attack surface')} للنظام، من أجل تقليل مخاطر خروقات البيانات، والوصول غير المصرح به، واختراق الأنظمة، أو ${kw('البرامج الضارة (malware)', 'malware')}.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What does OS hardening aim to reduce?", options: ["Processing speed", "The system's attack surface", "Memory allocation", "Network bandwidth"], ans: 1 },
                    { type: 'mcq', q: "Which of the following is NOT listed as a risk OS hardening lowers?", options: ["Data breaches", "Hardware aging", "Unauthorized access", "Malware"], ans: 1 },
                    { type: 'tf', q: "OS hardening is the process of removing security measures.", ans: "false" },
                    { type: 'tf', q: "Windows and Linux are examples of operating systems that can be hardened.", ans: "true" },
                    { type: 'short', q: "What kind of software is implemented to strengthen systems against cyberattacks?", ans: "patching / security measures" },
                    { type: 'short', q: "What type of computing systems is the goal to protect?", ans: "sensitive computing systems" }
                ]
            },
            {
                id: 4,
                titleEn: "Operating System Hardening (Cont.)",
                titleAr: "تقوية نظام التشغيل (يتبع)",
                contentEn: `
                    <h2 class="slide-title">Operating System Hardening</h2>
                    <ul class="slide-list">
                        <li>Computer client and server systems are central components of the IT infrastructure for most organizations, may hold critical data and applications, and are a necessary tool for the function of an organization.</li>
                        <li class="mt-4">Accordingly, we need to be aware of the expected presence of ${kw('vulnerabilities', 'vulnerabilities')} in operating systems and applications as distributed, and the existence of worms scanning for such vulnerabilities at high rates.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">تقوية نظام التشغيل</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>تعد أنظمة عملاء وخوادم الكمبيوتر مكونات مركزية للبنية التحتية لتكنولوجيا المعلومات لمعظم المؤسسات، وقد تحتوي على بيانات وتطبيقات مهمة، وهي أداة ضرورية لعمل المؤسسة.</li>
                        <li class="mt-4">وبناءً على ذلك، يجب أن نكون على دراية بالوجود المتوقع لـ ${kw('نقاط الضعف (vulnerabilities)', 'vulnerabilities')} في أنظمة التشغيل والتطبيقات كما يتم توزيعها، ووجود ديدان (worms) تبحث عن نقاط الضعف هذه بمعدلات عالية.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "What are central components of IT infrastructure?", options: ["Printers", "Computer client and server systems", "Mice and keyboards", "External monitors"], ans: 1 },
                    { type: 'mcq', q: "What scans for vulnerabilities at high rates?", options: ["Worms", "Antivirus software", "Firewalls", "Users"], ans: 0 },
                    { type: 'tf', q: "Computer systems are a necessary tool for the function of an organization.", ans: "true" },
                    { type: 'tf', q: "Operating systems as distributed never have vulnerabilities.", ans: "false" },
                    { type: 'short', q: "What might computer client and server systems hold?", ans: "critical data and applications" },
                    { type: 'short', q: "What must we be aware of the expected presence of in OSs?", ans: "vulnerabilities" }
                ]
            },
            {
                id: 5,
                titleEn: "Operating System Hardening (Cont.)",
                titleAr: "تقوية نظام التشغيل (يتبع)",
                contentEn: `
                    <h2 class="slide-title">Operating System Hardening</h2>
                    <ul class="slide-list">
                        <li>Thus, a system can be compromised during the installation process before it can install the latest patches or implement other hardening measures.</li>
                        <li class="mt-4">Hence, building and deploying a system should be a planned process designed to counter such a threat and maintain security during its operational lifetime.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">تقوية نظام التشغيل</h2>
                    <ul class="slide-list" dir="rtl">
                        <li>وبالتالي، يمكن اختراق النظام أثناء عملية التثبيت قبل أن يتمكن من تثبيت أحدث التصحيحات أو تنفيذ إجراءات التقوية الأخرى.</li>
                        <li class="mt-4">ومن ثم، يجب أن يكون بناء ونشر النظام عملية مخططة ومصممة لمواجهة مثل هذا التهديد والحفاظ على الأمن خلال فترة تشغيله.</li>
                    </ul>
                `,
                quiz: [
                    { type: 'mcq', q: "When can a system be compromised before patches are installed?", options: ["During shutdown", "During the installation process", "After 5 years of use", "While printing"], ans: 1 },
                    { type: 'mcq', q: "Building and deploying a system should be what kind of process?", options: ["A random process", "A rushed process", "A planned process", "An automated blind process"], ans: 2 },
                    { type: 'tf', q: "A system is completely safe during its initial installation process.", ans: "false" },
                    { type: 'tf', q: "Deploying a system needs to be designed to counter threats.", ans: "true" },
                    { type: 'short', q: "What should maintain security during a system's operational lifetime?", ans: "planned process (building and deploying)" },
                    { type: 'short', q: "What might a system fail to install before it gets compromised during setup?", ans: "latest patches / hardening measures" }
                ]
            },
            {
                id: 6,
                titleEn: "Operating System Hardening Process",
                titleAr: "عملية تقوية نظام التشغيل",
                contentEn: `
                    <h2 class="slide-title">Operating System Hardening</h2>
                    <p class="mb-2 text-xl font-bold">Process must:</p>
                    <ul class="slide-list">
                        <li>Assess risks and plan the system deployment.</li>
                        <li>Secure the underlying operating system and then the key applications.</li>
                        <li>Ensure any critical content is secured.</li>
                        <li>Ensure appropriate network protection mechanisms are used 
                            <br><span class="text-sm text-gray-600">(${kw('Firewalls', 'Firewalls')}, Intrusion Detection Systems (${kw('IDS', 'IDS')}), and Intrusion Prevention Systems (${kw('IPS', 'IPS')})) .</span>
                        </li>
                        <li>Ensure appropriate processes are used to maintain security.</li>
                    </ul>
                `,
                contentAr: `
                    <h2 class="slide-title">تقوية نظام التشغيل</h2>
                    <p class="mb-2 text-xl font-bold" dir="rtl">يجب أن تقوم العملية بما يلي:</p>
                    <ul class="slide-list" dir="rtl">
                        <li>تقييم المخاطر وتخطيط نشر النظام.</li>
                        <li>تأمين نظام التشغيل الأساسي ثم التطبيقات الرئيسية.</li>

                };
                slideNav.appendChild(li);
            });
        }

        // Render specific slide
        function renderSlide(index) {
            const slide = slides[index];
            const content = isArabic ? slide.contentAr : slide.contentEn;
            
            // Footer HTML structure
            const footer = `
                <div class="mt-auto pt-8 border-t border-gray-200 flex justify-between items-center text-sm text-gray-500 ${isArabic ? 'flex-row-reverse' : ''}">
                    <div class="font-bold text-blue-800">BU <br> <span class="font-normal text-xs text-black">${isArabic ? 'جامعة الباحة' : 'Al-Baha University'}</span></div>
                    <div class="bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center font-bold">${slide.id}</div>
                </div>
            `;

            slideContent.innerHTML = content + footer;

            // Handle Quiz Button visibility
            if(slide.quiz && slide.quiz.length > 0) {
                quizBtn.style.display = 'flex';
            } else {
                quizBtn.style.display = 'none';
            }
        }

        // Translation Toggle
        langToggleBtn.onclick = () => {
            isArabic = !isArabic;
            document.documentElement.lang = isArabic ? 'ar' : 'en';
            document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
            langText.innerText = isArabic ? 'English' : 'ترجمة للعربية';
            
            // Update sidebar direction/layout roughly
            if(isArabic) {
                sidebar.classList.remove('border-r');
                sidebar.classList.add('border-l');
            } else {
                sidebar.classList.remove('border-l');
                sidebar.classList.add('border-r');
            }

            buildNavigation();
            renderSlide(currentSlideIndex);
        };

        // Sidebar Toggle
        toggleSidebarBtn.onclick = () => {
            sidebar.classList.toggle('w-0');
            sidebar.classList.toggle('w-1/4');
            sidebar.classList.toggle('px-0');
        };

        // --- 3. MODALS (Keywords & Quiz) ---

        function showKeyword(wordKey) {
            const data = dictionary[wordKey];
            if(!data) return;

            document.getElementById('kw-title').innerText = wordKey;
            document.getElementById('kw-en').innerText = data.en;
            document.getElementById('kw-ar').innerText = data.ar;
            
            document.getElementById('keyword-modal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'quiz-modal') {
                document.getElementById('quiz-results').classList.add('hidden');
                document.getElementById('quiz-results').innerHTML = '';
            }
        }

        quizBtn.onclick = () => {
            const slide = slides[currentSlideIndex];
            if(!slide || !slide.quiz || slide.quiz.length === 0) return;

            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            document.getElementById('quiz-results').classList.add('hidden');

            slide.quiz.forEach((q, i) => {
                let html = `<div class="quiz-question" id="q-block-${i}">
                    <p class="font-bold text-lg mb-2" dir="ltr">${i + 1}. ${q.q}</p>`;

                if(q.type === 'mcq') {
                    q.options.forEach((opt, optIndex) => {
                        html += `<label class="block cursor-pointer p-2 hover:bg-blue-50 rounded" dir="ltr">
                            <input type="radio" name="q${i}" value="${optIndex}" class="mr-2"> ${opt}
                        </label>`;
                    });
                } else if(q.type === 'tf') {
                    html += `
                        <label class="inline-block cursor-pointer p-2 mr-4 hover:bg-blue-50 rounded" dir="ltr"><input type="radio" name="q${i}" value="true" class="mr-1"> True</label>
                        <label class="inline-block cursor-pointer p-2 hover:bg-blue-50 rounded" dir="ltr"><input type="radio" name="q${i}" value="false" class="mr-1"> False</label>
                    `;
                } else if(q.type === 'short') {
                    html += `<input type="text" name="q${i}" class="w-full border border-gray-300 p-2 rounded mt-1 focus:outline-none focus:border-blue-500" placeholder="Type your answer..." dir="ltr">`;
                }
                
                html += `</div>`;
                container.innerHTML += html;
            });

            document.getElementById('quiz-modal').style.display = 'flex';
        };

        function evaluateQuiz() {
            const slide = slides[currentSlideIndex];
            let score = 0;
            const resultsDiv = document.getElementById('quiz-results');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            slide.quiz.forEach((q, i) => {
                const block = document.getElementById(`q-block-${i}`);
                let isCorrect = false;
                let userAnswer = '';
                let correctAnswerStr = '';

                if(q.type === 'mcq') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.options[q.ans];
                    if(selected) {
                        userAnswer = q.options[parseInt(selected.value)];
                        if(parseInt(selected.value) === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'tf') {
                    const selected = document.querySelector(`input[name="q${i}"]:checked`);
                    correctAnswerStr = q.ans.charAt(0).toUpperCase() + q.ans.slice(1);
                    if(selected) {
                        userAnswer = selected.value === "true" ? "True" : "False";
                        if(selected.value === q.ans) isCorrect = true;
                    }
                } else if (q.type === 'short') {
                    const input = document.querySelector(`input[name="q${i}"]`);
                    correctAnswerStr = q.ans;
                    if(input && input.value.trim() !== '') {
                        userAnswer = input.value.trim();
                        if(userAnswer.length > 2) {
                             isCorrect = true; 
                        }
                    }
                }

                if(isCorrect) score++;

                const feedback = document.createElement('div');
                feedback.className = 'mt-2 p-3 rounded ' + (isCorrect ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300');
                feedback.innerHTML = `
                    <p class="${isCorrect ? 'correct-answer' : 'wrong-answer'}">
                        <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'} mr-1"></i>
                        Q${i+1}: ${isCorrect ? 'Correct!' : 'Incorrect.'}
                    </p>
                    ${!isCorrect ? `<p class="text-sm mt-1 text-gray-700"><b>Correct Answer:</b> ${correctAnswerStr}</p>` : ''}
                `;
                block.appendChild(feedback);
            });

            resultsDiv.innerHTML = `<div class="bg-indigo-100 border-l-4 border-indigo-500 p-4 rounded text-center">
                <p class="text-2xl font-bold text-indigo-800">Your Score: ${score} / 6</p>
            </div>`;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const kwModal = document.getElementById('keyword-modal');
            const qzModal = document.getElementById('quiz-modal');
            if (event.target == kwModal) {
                closeModal('keyword-modal');
            }
            if (event.target == qzModal) {
                closeModal('quiz-modal');
            }
        }

        // Start
        window.onload = init;

    </script>
</body>
</html>
