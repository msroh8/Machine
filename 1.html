<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم المهام الأدائية | النقر والتتبع</title>
    
    <!-- مكتبة Tailwind CSS للتصميم الاحترافي -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- مكتبة FontAwesome للأيقونات -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- خطوط جوجل (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- إعدادات Tailwind وتنسيقات مخصصة -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0f172a',
                        secondary: '#3b82f6',
                        accent: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        /* تأثيرات حركية مخصصة */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">

    <!-- رأس الصفحة (Header) -->
    <header class="bg-primary text-white py-6 shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-20 -translate-y-1/2 translate-x-1/4"></div>
        <div class="absolute bottom-0 left-0 w-64 h-64 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-20 translate-y-1/2 -translate-x-1/4"></div>
        
        <div class="container mx-auto px-4 relative z-10 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">التصميم التعليمي وهندسة المطالبات</h1>
            <p class="text-slate-300 text-sm md:text-base font-light">تتبع مسار بناء المهام الأدائية التفاعلية</p>
        </div>
    </header>

    <!-- المحتوى الرئيسي (Main Content) -->
    <main class="flex-grow container mx-auto px-4 py-10 flex flex-col items-center justify-center">
        
        <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <!-- الجزء الأيمن: شريط التتبع (Timeline) -->
            <div class="md:col-span-4 bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
                <h2 class="text-xl font-bold mb-6 text-slate-700 border-b pb-3 border-slate-100">
                    <i class="fa-solid fa-route text-secondary ml-2"></i> مسار التعلم
                </h2>
                <div class="relative" id="timeline-container">
                    <!-- سيتم توليد الخطوات هنا بواسطة جافاسكريبت -->
                </div>
            </div>

            <!-- الجزء الأيسر: عرض التفاصيل (Content Display) -->
            <div class="md:col-span-8 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col h-full min-h-[400px]">
                <div class="bg-slate-100/50 p-6 border-b border-slate-100 flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-slate-800" id="content-title">
                        مرحباً بك
                    </h2>
                    <div id="content-icon-wrapper" class="w-12 h-12 rounded-full bg-secondary text-white flex items-center justify-center text-xl shadow-lg">
                        <i class="fa-solid fa-play" id="content-icon"></i>
                    </div>
                </div>
                
                <div class="p-8 flex-grow flex items-center justify-center relative">
                    <!-- الزخرفة الخلفية -->
                    <i class="fa-solid fa-quote-right absolute text-8xl text-slate-50 opacity-50 top-6 right-6"></i>
                    
                    <p id="content-text" class="text-xl md:text-2xl leading-relaxed text-slate-600 font-medium text-center z-10 fade-in-up">
                        انقر على الخطوة الأولى في المسار للبدء في تتبع عملية تصميم المهمة الأدائية وربطها بهندسة المطالبات.
                    </p>
                </div>

                <!-- أزرار التحكم -->
                <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-between items-center">
                    <button id="btn-prev" class="px-5 py-2.5 rounded-lg font-semibold text-slate-500 hover:bg-slate-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-arrow-right ml-2"></i> السابق
                    </button>
                    <div class="flex space-x-2 space-x-reverse" id="dots-container">
                        <!-- النقاط التوضيحية -->
                    </div>
                    <button id="btn-next" class="px-5 py-2.5 rounded-lg font-semibold bg-secondary text-white hover:bg-blue-600 shadow-md hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        التالي <i class="fa-solid fa-arrow-left mr-2"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- تذييل الصفحة (Footer) -->
    <footer class="bg-slate-900 text-slate-400 py-6 border-t-4 border-secondary text-center">
        <div class="container mx-auto px-4">
            <p class="font-medium text-sm md:text-base text-slate-300">
                هندسة المطالبات للنماذج التوليدية لتصميم المهام أدائية 
                <span class="block md:inline mt-2 md:mt-0 md:mr-2 text-secondary">
                    <i class="fa-solid fa-circle text-[8px] hidden md:inline-block align-middle ml-2"></i>
                    مجتمعات تبادل المعرفة في الاتجاه التخصصي
                </span>
            </p>
        </div>
    </footer>

    <!-- منطق التفاعل (JavaScript) -->
    <script>
        // بيانات النص مقسمة إلى خطوات لتسهيل التتبع والاستيعاب
        const stepsData = [
            {
                id: 1,
                title: "تحليل ناتج التعلم",
                text: "تبدأ عملية تصميم المهمة الأدائية بتحليل ناتج التعلم المستهدف.",
                icon: "fa-crosshairs",
                color: "text-blue-500",
                bg: "bg-blue-500",
                lightBg: "bg-blue-100"
            },
            {
                id: 2,
                title: "الترجمة إلى عناصر",
                text: "تُترجم هذه النواتج إلى عناصر داخل المطالبة مثل الأداء المتوقع، والسياق، ومعايير النجاح.",
                icon: "fa-layer-group",
                color: "text-purple-500",
                bg: "bg-purple-500",
                lightBg: "bg-purple-100"
            },
            {
                id: 3,
                title: "الفهم التربوي للنموذج",
                text: "تمكن هذه العملية النموذج التوليدي من فهم الغرض التربوي للمهمة.",
                icon: "fa-brain",
                color: "text-emerald-500",
                bg: "bg-emerald-500",
                lightBg: "bg-emerald-100"
            },
            {
                id: 4,
                title: "المواءمة المباشرة",
                text: "كلما كانت المطالبة معبرة عن ناتج التعلم بشكل مباشر، جاءت المهمة أكثر مواءمة.",
                icon: "fa-bullseye",
                color: "text-amber-500",
                bg: "bg-amber-500",
                lightBg: "bg-amber-100"
            },
            {
                id: 5,
                title: "جوهر الربط",
                text: "يمثل هذا الانتقال جوهر الربط بين التصميم التعليمي وهندسة المطالبات.",
                icon: "fa-link",
                color: "text-indigo-500",
                bg: "bg-indigo-500",
                lightBg: "bg-indigo-100"
            },
            {
                id: 6,
                title: "مثال تطبيقي: ناتج التعلم",
                text: "لنفترض أن ناتج التعلم هو: أن يحلل المتعلم أسباب التلوث البيئي ويقترح حلولاً مبتكرة للحد منه.",
                icon: "fa-lightbulb",
                color: "text-rose-500",
                bg: "bg-rose-500",
                lightBg: "bg-rose-100"
            },
            {
                id: 7,
                title: "تتبع المثال: هندسة المطالبة",
                text: "تُصاغ المطالبة للنموذج كالتالي: صمم مهمة أدائية يحلل فيها المتعلم التلوث (الأداء) في بيئته المحلية (السياق)، وتُقيم بناءً على واقعية الحلول المقترحة (معايير النجاح).",
                icon: "fa-gears",
                color: "text-cyan-500",
                bg: "bg-cyan-500",
                lightBg: "bg-cyan-100"
            }
        ];

        let currentStepIndex = -1; // -1 يعني شاشة الترحيب

        // عناصر DOM
        const timelineContainer = document.getElementById('timeline-container');
        const contentTitle = document.getElementById('content-title');
        const contentText = document.getElementById('content-text');
        const contentIcon = document.getElementById('content-icon');
        const contentIconWrapper = document.getElementById('content-icon-wrapper');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const dotsContainer = document.getElementById('dots-container');

        // تهيئة الصفحة
        function init() {
            renderTimeline();
            renderDots();
            updateUI();
            
            btnNext.addEventListener('click', () => {
                if (currentStepIndex < stepsData.length - 1) {
                    currentStepIndex++;
                    updateUI();
                }
            });

            btnPrev.addEventListener('click', () => {
                if (currentStepIndex > -1) {
                    currentStepIndex--;
                    updateUI();
                }
            });
        }

        // بناء شريط التتبع
        function renderTimeline() {
            timelineContainer.innerHTML = '';
            
            // الخط الواصل بين النقاط
            const line = document.createElement('div');
            line.className = 'absolute right-[19px] top-6 bottom-6 w-1 bg-slate-200 z-0 rounded-full';
            timelineContainer.appendChild(line);

            const activeLine = document.createElement('div');
            activeLine.id = 'active-timeline-line';
            activeLine.className = 'absolute right-[19px] top-6 w-1 bg-secondary z-0 rounded-full transition-all duration-500 ease-out';
            activeLine.style.height = '0%';
            timelineContainer.appendChild(activeLine);

            stepsData.forEach((step, index) => {
                const stepEl = document.createElement('div');
                stepEl.className = 'relative z-10 flex items-start mb-8 cursor-pointer group step-item';
                stepEl.onclick = () => {
                    currentStepIndex = index;
                    updateUI();
                };

                stepEl.innerHTML = `
                    <div class="w-10 h-10 rounded-full border-4 border-white shadow-sm flex items-center justify-center shrink-0 step-circle transition-all duration-300 ${index === 0 && currentStepIndex === -1 ? 'bg-slate-200 animate-pulse' : 'bg-slate-200'}">
                        <i class="fa-solid ${step.icon} text-sm step-icon text-slate-400"></i>
                    </div>
                    <div class="mr-4 pt-1">
                        <h3 class="font-bold text-base step-title text-slate-500 transition-colors duration-300 group-hover:text-slate-800">${step.title}</h3>
                        <p class="text-xs text-slate-400 mt-1 step-desc transition-colors duration-300">الخطوة ${index + 1}</p>
                    </div>
                `;
                timelineContainer.appendChild(stepEl);
            });
        }

        // بناء النقاط السفلية (Dots)
        function renderDots() {
            dotsContainer.innerHTML = '';
            // نقطة البداية
            createDot(-1);
            stepsData.forEach((_, index) => {
                createDot(index);
            });
        }

        function createDot(index) {
            const dot = document.createElement('div');
            dot.className = `w-2 h-2 rounded-full cursor-pointer transition-all duration-300 dot-item`;
            dot.onclick = () => {
                currentStepIndex = index;
                updateUI();
            };
            dotsContainer.appendChild(dot);
        }

        // تحديث واجهة المستخدم بناءً على الخطوة الحالية
        function updateUI() {
            const stepItems = document.querySelectorAll('.step-item');
            const stepCircles = document.querySelectorAll('.step-circle');
            const stepIcons = document.querySelectorAll('.step-icon');
            const stepTitles = document.querySelectorAll('.step-title');
            const dotItems = document.querySelectorAll('.dot-item');
            const activeLine = document.getElementById('active-timeline-line');

            // إزالة الانيميشن وتفعيله مرة أخرى لإحداث تأثير Fade
            contentText.classList.remove('fade-in-up');
            void contentText.offsetWidth; // Trigger reflow
            contentText.classList.add('fade-in-up');

            if (currentStepIndex === -1) {
                // شاشة البداية
                contentTitle.textContent = "مقدمة المهمة";
                contentText.innerHTML = `في هذه الرحلة التفاعلية، سنتعرف على كيفية ترجمة <span class="font-bold text-secondary">نواتج التعلم</span> إلى مطالبة (Prompt) فعّالة لتوجيه النماذج التوليدية.<br><br>انقر على زر <strong>التالي</strong> أو على خطوات المسار للبدء.`;
                contentIcon.className = "fa-solid fa-play";
                contentIconWrapper.className = "w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center text-xl shadow-lg transition-colors duration-500";
                
                activeLine.style.height = '0%';
            } else {
                // عرض الخطوة المحددة
                const step = stepsData[currentStepIndex];
                contentTitle.textContent = step.title;
                
                // تمييز الكلمات المفتاحية في النص
                let formattedText = step.text
                    .replace('ناتج التعلم المستهدف', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">ناتج التعلم المستهدف</span>`)
                    .replace('الأداء المتوقع، والسياق، ومعايير النجاح', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">الأداء المتوقع، والسياق، ومعايير النجاح</span>`)
                    .replace('النموذج التوليدي', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">النموذج التوليدي</span>`)
                    .replace('أكثر مواءمة', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">أكثر مواءمة</span>`)
                    .replace('التصميم التعليمي وهندسة المطالبات', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">التصميم التعليمي وهندسة المطالبات</span>`)
                    .replace('ناتج التعلم', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">ناتج التعلم</span>`)
                    .replace('(الأداء)', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">(الأداء)</span>`)
                    .replace('(السياق)', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">(السياق)</span>`)
                    .replace('(معايير النجاح)', `<span class="font-bold px-1 rounded ${step.lightBg} ${step.color}">(معايير النجاح)</span>`);
                
                contentText.innerHTML = formattedText;
                
                contentIcon.className = `fa-solid ${step.icon}`;
                contentIconWrapper.className = `w-12 h-12 rounded-full ${step.bg} text-white flex items-center justify-center text-xl shadow-lg transition-all duration-500 transform scale-110`;

                // حساب ارتفاع خط التقدم
                const progressPercentage = (currentStepIndex / (stepsData.length - 1)) * 100;
                activeLine.style.height = `calc(${progressPercentage}% + 10px)`;
            }

            // تحديث الألوان في شريط التتبع
            stepItems.forEach((item, index) => {
                const circle = stepCircles[index];
                const icon = stepIcons[index];
                const title = stepTitles[index];

                circle.classList.remove('animate-pulse');

                if (index < currentStepIndex) {
                    // خطوات سابقة (مكتملة)
                    circle.className = `w-10 h-10 rounded-full border-4 border-white shadow-sm flex items-center justify-center shrink-0 step-circle transition-all duration-300 ${stepsData[index].bg}`;
                    icon.className = `fa-solid fa-check text-sm step-icon text-white`;
                    title.className = `font-bold text-base step-title transition-colors duration-300 text-slate-800`;
                } else if (index === currentStepIndex) {
                    // الخطوة الحالية (نشطة)
                    circle.className = `w-10 h-10 rounded-full border-4 border-white shadow-md flex items-center justify-center shrink-0 step-circle transition-all duration-300 ${stepsData[index].bg} ring-4 ring-${stepsData[index].bg.replace('bg-', '')}/30 transform scale-110`;
                    icon.className = `fa-solid ${stepsData[index].icon} text-sm step-icon text-white animate-bounce mt-1`;
                    title.className = `font-extrabold text-lg step-title transition-colors duration-300 ${stepsData[index].color}`;
                } else {
                    // خطوات قادمة
                    circle.className = `w-10 h-10 rounded-full border-4 border-white shadow-sm flex items-center justify-center shrink-0 step-circle transition-all duration-300 bg-slate-100`;
                    icon.className = `fa-solid ${stepsData[index].icon} text-sm step-icon text-slate-300`;
                    title.className = `font-bold text-base step-title transition-colors duration-300 text-slate-400`;
                    
                    // إضافة نبض للخطوة التالية المتاحة
                    if (index === currentStepIndex + 1) {
                        circle.classList.add('animate-pulse', 'bg-slate-200');
                    }
                }
            });

            // تحديث النقاط السفلية
            dotItems.forEach((dot, index) => {
                if (index - 1 === currentStepIndex) {
                    dot.className = `w-6 h-2 rounded-full cursor-pointer transition-all duration-300 dot-item ${currentStepIndex === -1 ? 'bg-slate-800' : stepsData[currentStepIndex].bg}`;
                } else {
                    dot.className = `w-2 h-2 rounded-full cursor-pointer transition-all duration-300 dot-item bg-slate-300 hover:bg-slate-400`;
                }
            });

            // تحديث حالة الأزرار
            btnPrev.disabled = currentStepIndex === -1;
            
            if (currentStepIndex === stepsData.length - 1) {
                btnNext.innerHTML = '<i class="fa-solid fa-rotate-right ml-2"></i> إعادة';
                btnNext.classList.replace('bg-secondary', 'bg-slate-800');
                btnNext.classList.replace('hover:bg-blue-600', 'hover:bg-slate-700');
                btnNext.onclick = () => {
                    currentStepIndex = -1;
                    btnNext.innerHTML = 'التالي <i class="fa-solid fa-arrow-left mr-2"></i>';
                    btnNext.classList.replace('bg-slate-800', 'bg-secondary');
                    btnNext.classList.replace('hover:bg-slate-700', 'hover:bg-blue-600');
                    updateUI();
                };
            } else {
                btnNext.innerHTML = 'التالي <i class="fa-solid fa-arrow-left mr-2"></i>';
                btnNext.classList.replace('bg-slate-800', 'bg-secondary');
                btnNext.classList.replace('hover:bg-slate-700', 'hover:bg-blue-600');
                btnNext.onclick = () => {
                    if (currentStepIndex < stepsData.length - 1) {
                        currentStepIndex++;
                        updateUI();
                    }
                };
            }
        }

        // تشغيل التطبيق عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
